
<!-- PAGE: รายรับ -->
<div class="page" id="page-income">
  <!-- แทนที่ header ของ page-income -->
  <div class="header" style="justify-content:space-between; align-items:center;">
    <h1>บันทึกรายรับ</h1>
    <button onclick="showPage('menu',this)"
      style="background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.5);
      color:white; padding:6px 12px; border-radius:20px; font-size:12px;
      cursor:pointer; font-family:'Sarabun',sans-serif;">
      🍽 เพิ่มเมนู
    </button>
  </div>
  <div class="form-body">
    <div class="form-group">
      <label class="form-label">วันที่</label>
      <input class="form-input" type="date" id="income-date">
    </div>
    <div class="form-group">
      <label class="form-label">เลขที่บิล</label>
      <input class="form-input" type="text" id="income-invoice" placeholder="เช่น INV-001">
    </div>
    <div class="form-group">
      <label class="form-label">ลูกค้า</label>
      <input class="form-input" type="text" id="income-customer" placeholder="ชื่อลูกค้า / บริษัท">
    </div>
    <div class="form-group">
      <label class="form-label">รายการ</label>
      <div id="income-items"></div>
      <button class="btn-add-item" onclick="addIncomeItem()">+ เพิ่มรายการ</button>
    </div>
    <div class="metric-card" style="margin-bottom:14px;text-align:center;">
      <div class="metric-label">ยอดรวม</div>
      <div class="metric-val income-val" id="income-total-display">฿0.00</div>
    </div>
    <!-- <button class="btn-save" id="btn-save-income" onclick="submitIncome()">บันทึกรายรับ</button> -->
    <div style="display:grid; grid-template-columns:1fr auto; gap:10px; margin-top:4px;">
      <button class="btn-save" id="btn-save-income" onclick="submitIncome()">
        บันทึกรายรับ
      </button>
    </div>
  </div>
</div>
