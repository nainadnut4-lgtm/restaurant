function getCategoryIcon(name) {

  const lower = name.toLowerCase();
  for (const m of CAT_ICON_MAP) {
    for (const k of m.keys) {
      if (lower.includes(k.toLowerCase())) return m.icon;
    }
  }

// ===== PRELOADER =====
function initPreloader() {
  var done = 0, total = 6;
  function setStep(i, cls) {
    var el = document.getElementById('pre-s' + i);
    if (el) el.className = 'pre-step-item ' + cls;
  }
  function tick(stepId, msg) {
    done++;
    setStep(stepId, 'done');
    var pct = Math.round(done / total * 100);
    var ring = document.getElementById('pre-ring-path');
    var pctEl = document.getElementById('pre-pct-text');
    var msgEl = document.getElementById('pre-bottom-msg');
    if (ring)  ring.style.strokeDashoffset = (226.2 * (1 - pct / 100)).toFixed(1);
    if (pctEl) pctEl.textContent = pct + '%';
    if (msgEl) msgEl.textContent = msg;
    if (done >= total) finishPreloader();
  }
  for (var i = 1; i <= total; i++) setStep(i, 'active');

  google.script.run
    .withSuccessHandler(function(res) {
      _preloadSummary = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      tick(1, 'โหลดข้อมูลการเงิน ✓');
    })
    .withFailureHandler(function() { tick(1, 'ข้อมูลการเงิน —'); })
    .getSummary();

  google.script.run
    .withSuccessHandler(function(res) {
      allHistory = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      tick(2, 'โหลดประวัติรายการ ✓');
    })
    .withFailureHandler(function() { tick(2, 'ประวัติรายการ —'); })
    .getHistory();

  google.script.run
    .withSuccessHandler(function(res) {
      allMenuItems = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      tick(3, 'โหลดรายการเมนู ✓');
    })
    .withFailureHandler(function() { tick(3, 'รายการเมนู —'); })
    .getMenuItems();

  google.script.run
    .withSuccessHandler(function(res) {
      menuCategories = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      tick(4, 'โหลดประเภทเมนู ✓');
    })
    .withFailureHandler(function() { tick(4, 'ประเภทเมนู —'); })
    .getMenuCategories();

  google.script.run
    .withSuccessHandler(function(res) {
      tableSessionCache = (res && res.data) ? res.data : [];
      tick(5, 'โหลดสถานะโต๊ะ ✓');
    })
    .withFailureHandler(function() { tick(5, 'สถานะโต๊ะ —'); })
    .getOpenSessions();

  google.script.run
    .withSuccessHandler(function(list) {
      expenseDescriptions = list || [];
      tick(6, 'พร้อมใช้งาน ✓');
    })
    .withFailureHandler(function() { tick(6, ''); })
    .getExpenseDescriptions();
}

function showPage(name, el) {
  // ตรวจสิทธิ์
  if (PROTECTED_PAGES.includes(name)) {
    const allowed = authRole && (ROLE_ACCESS[authRole] || []).includes(name);
    if (!allowed) {
      _pinTarget = name;
      document.getElementById('pin-page-label').textContent =
        name === 'home'    ? 'หน้าหลัก'  :
        name === 'expense' ? 'รายจ่าย'   :
        name === 'history' ? 'ประวัติ'   : 'ค้นหา';
      pinReset();
      document.getElementById('modal-pin').style.display = 'flex';
      return;
    }
  }
  _doShowPage(name, el);
}

function _doShowPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (el) el.classList.add('active');
  else {
    const map = { home:0, expense:1, income:2, history:3, search:4 };
    const idx = map[name];
    if (idx !== undefined) {
      const navItems = document.querySelectorAll('.nav-item');
      if (navItems[idx]) navItems[idx].classList.add('active');
    }
  }
  if (name === 'menu') { loadMenuCategories(); loadMenuItems(); }
  if (name === 'income') {
    if (allMenuItems.length === 0) {
      posShowLoading(true);
      loadMenuItemsForPOS();
    } else {
      initPOS();
    }
  }
  if (name === 'analytics') {
    if (allMenuItems.length === 0) loadMenuItems(false);
    loadAnalyticsData();
  }
  if (name === 'kitchen') loadKitchenOrders();
}


// ===== PIN FUNCTIONS =====
function pinReset() {
  _pinValue = '';
  pinUpdateDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-error').style.color = '#e53935';
}


function pinUpdateDots() {
  document.querySelectorAll('#pin-dots .pin-dot').forEach((d, i) => {
    d.className = 'pin-dot' + (i < _pinValue.length ? ' filled' : '');
  });
}

function pinPress(n) {
  if (_pinValue.length >= 6) return;
  _pinValue += n;
  pinUpdateDots();
  if (_pinValue.length === 6) pinSubmit();
}

function pinDelete() {
  _pinValue = _pinValue.slice(0, -1);
  pinUpdateDots();
}

// แทนที่ function pinCancel()
function pinCancel() {
  document.getElementById('modal-pin').style.display = 'none';
  pinReset();
}

function pinSubmit() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        authRole = res.data.role;
        authName = res.data.name;
        // dot เขียวก่อน close
        document.querySelectorAll('#pin-dots .pin-dot').forEach(d => {
          d.className = 'pin-dot filled';
        });
        document.getElementById('pin-error').style.color = '#1D9E75';
        document.getElementById('pin-error').textContent = '✓ สวัสดี ' + authName;
        setTimeout(function() {
          document.getElementById('modal-pin').style.display = 'none';
          updateNavLocks();
          const target = _pinTarget;
          pinReset();
          _doShowPage(target, null);
        }, 600);
      } else {
        // dot แดง + shake
        document.querySelectorAll('#pin-dots .pin-dot').forEach(d => {
          d.className = 'pin-dot error';
        });
        document.getElementById('pin-error').textContent = 'รหัสไม่ถูกต้อง ลองใหม่';
        setTimeout(function() {
          _pinValue = '';
          pinUpdateDots();
        }, 800);
      }
    })
    .withFailureHandler(function() {
      document.getElementById('pin-error').textContent = 'เกิดข้อผิดพลาด ลองใหม่';
      _pinValue = '';
      pinUpdateDots();
    })
    .getAdminByPin({ pin: _pinValue });
}

function updateNavLocks() {
  const navItems = document.querySelectorAll('.nav-item');
  const labels   = ['home', 'expense', 'income', 'history', 'search'];
  navItems.forEach((nav, i) => {
    const page = labels[i];
    const lockEl = nav.querySelector('.nav-lock');
    if (!PROTECTED_PAGES.includes(page)) return;
    const canAccess = authRole && (ROLE_ACCESS[authRole] || []).includes(page);
    if (lockEl) lockEl.style.display = canAccess ? 'none' : 'block';
  });
  // FAB logout
  const fab = document.getElementById('fab-logout');
  const fabLabel = document.getElementById('fab-label');
  if (fab) {
    if (authRole) {
      fab.classList.add('show');
      fabLabel.textContent = '👤 ' + authName;
    } else {
      fab.classList.remove('show');
    }
  }
}

function doLogout() {
  if (!confirm('ออกจากระบบ?\nจะกลับเป็นสิทธิ์เดิม ต้องใส่ PIN ใหม่')) return;
  authRole = null;
  authName = '';
  updateNavLocks();
  _doShowPage('income', document.querySelectorAll('.nav-item')[2]);
  showToast('ออกจากระบบแล้ว');
}

// ---- 2-WAY BINDING HANDLERS ----
function expOnUnitInput(inp) {
  const row = inp.closest('.item-row');
  row.dataset.last = 'unit';
  const qty  = parseFloat(row.querySelector('.exp-qty').value) || 0;
  const unit = parseFloat(inp.value) || 0;
  row.querySelector('.exp-total').value = inp.value === '' ? '' : (qty * unit).toFixed(2);
  expUpdateFieldState(row);
  calcExpenseTotal();
}

function expOnTotalInput(inp) {
  const row = inp.closest('.item-row');
  row.dataset.last = 'total';
  const qty   = parseFloat(row.querySelector('.exp-qty').value) || 0;
  const total = parseFloat(inp.value) || 0;
  row.querySelector('.exp-unit').value = 
    inp.value === '' ? '' : (qty > 0 ? (total / qty).toFixed(2) : 0);
  expUpdateFieldState(row);
  calcExpenseTotal();
}


function expOnQtyInput(inp) {
  const row     = inp.closest('.item-row');
  const qty     = parseFloat(inp.value) || 0;
  const unitEl  = row.querySelector('.exp-unit');
  const totalEl = row.querySelector('.exp-total');
  if (row.dataset.last === 'total') {
    const total = parseFloat(totalEl.value) || 0;
    unitEl.value = qty > 0 ? (total / qty).toFixed(2) : 0;
  } else {
    const unit = parseFloat(unitEl.value) || 0;
    totalEl.value = (qty * unit).toFixed(2);
  }
  calcExpenseTotal();
}


function expUpdateFieldState(row) {
  const unitEl  = row.querySelector('.exp-unit');
  const totalEl = row.querySelector('.exp-total');
  const caps    = row.querySelectorAll('.exp-field-cap');
  const last    = row.dataset.last;

  unitEl.classList.remove('exp-field-edit', 'exp-field-auto');
  totalEl.classList.remove('exp-field-edit', 'exp-field-auto');

  if (last === 'unit') {
    unitEl.classList.add('exp-field-edit');
    totalEl.classList.add('exp-field-auto');
    caps[0].className = 'exp-field-cap exp-cap-state-edit';
    caps[0].textContent = '✎ แก้';
    caps[1].className = 'exp-field-cap exp-cap-state-auto';
    caps[1].textContent = '🔄 auto';
  } else {
    unitEl.classList.add('exp-field-auto');
    totalEl.classList.add('exp-field-edit');
    caps[0].className = 'exp-field-cap exp-cap-state-auto';
    caps[0].textContent = '🔄 auto';
    caps[1].className = 'exp-field-cap exp-cap-state-edit';
    caps[1].textContent = '✎ แก้';
  }
}

// ---- calcExpenseTotal — sum จาก .exp-total ตรงๆ ----
function calcExpenseTotal() {
  let total = 0;
  document.querySelectorAll('#expense-items .item-row').forEach(row => {
    total += parseFloat(row.querySelector('.exp-total').value) || 0;
  });
  document.getElementById('expense-total-display').textContent = '฿' + total.toFixed(2);
}
// ---- INCOME ITEMS ----
function addIncomeItem() {
  const wrap = document.getElementById('income-items');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input class="form-input" type="text" placeholder="รายการ/บริการ" oninput="calcIncomeTotal()">
    <input class="form-input" type="number" placeholder="จำนวน" value="1" oninput="calcIncomeTotal()">
    <input class="form-input" type="number" placeholder="ราคา" oninput="calcIncomeTotal()">
    <button class="btn-remove" onclick="removeItem(this,'income-items','calcIncomeTotal')">×</button>
  `;
  wrap.appendChild(row);
}

function calcIncomeTotal() {
  let total = 0;
  document.querySelectorAll('#income-items .item-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    total += (parseFloat(inputs[1].value)||0) * (parseFloat(inputs[2].value)||0);
  });
  document.getElementById('income-total-display').textContent = '฿' + total.toFixed(2);
}

function removeItem(btn, wrapperId, calcFn) {
  const wrap = document.getElementById(wrapperId);
  if (wrap.children.length > 1) {
    btn.closest('.item-row').remove();
    window[calcFn]();
  }
}

function submitExpense() {
  const date = document.getElementById('expense-date').value;
  if (!date) { showToast('กรุณาเลือกวันที่'); return; }

  const items = [];
  let total = 0;
  document.querySelectorAll('#expense-items .item-row').forEach(row => {
    const desc     = row.querySelector('input[type=text]').value.trim();
    const unit     = row.querySelector('select').value;
    const qty      = parseFloat(row.querySelector('.exp-qty').value)   || 1;
    const rowTotal = parseFloat(row.querySelector('.exp-total').value) || 0;
    const unitPrice = qty > 0 ? (rowTotal / qty) : 0;
    if (desc && rowTotal > 0) {
      items.push({ description: desc, quantity: qty, unit: unit, unit_price: unitPrice });
      total += rowTotal;
    }
  });
  if (items.length === 0) { showToast('กรุณากรอกรายการและราคา'); return; }

  const btn = document.getElementById('btn-save-expense');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false; btn.textContent = 'บันทึกรายจ่าย';
      if (res.success) {
        showToast('✅ บันทึกสำเร็จ');
        resetExpenseForm();
        loadDashboard();
        loadHistory();
        loadExpenseDescriptions(); // refresh cache
      } else showToast('❌ ' + res.message);
    })
    .withFailureHandler(() => {
      btn.disabled = false; btn.textContent = 'บันทึกรายจ่าย';
      showToast('❌ เกิดข้อผิดพลาด');
    })
    .saveExpense({ source: selectedSource, date, total,
      note: document.getElementById('expense-note').value, items });
}

// ---- SUBMIT INCOME ----
function submitIncome() {
  const date     = document.getElementById('income-date').value;
  const invoice  = document.getElementById('income-invoice').value.trim();
  const customer = document.getElementById('income-customer').value.trim();
  if (!date || !invoice || !customer) { showToast('กรุณากรอกข้อมูลให้ครบ'); return; }

  const items = [];
  let total = 0;
  document.querySelectorAll('#income-items .item-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const desc = inputs[0].value.trim();
    const qty  = parseFloat(inputs[1].value) || 1;
    const price = parseFloat(inputs[2].value) || 0;
    if (desc && price > 0) { items.push({ description: desc, quantity: qty, unit_price: price }); total += qty * price; }
  });
  if (items.length === 0) { showToast('กรุณากรอกรายการและราคา'); return; }

  const btn = document.getElementById('btn-save-income');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false; btn.textContent = 'บันทึกรายรับ';
      if (res.success) { showToast('✅ บันทึกสำเร็จ'); resetIncomeForm(); loadDashboard(); loadHistory(); }
      else showToast('❌ ' + res.message);
    })
    .withFailureHandler(() => { btn.disabled = false; btn.textContent = 'บันทึกรายรับ'; showToast('❌ เกิดข้อผิดพลาด'); })
    .saveIncome({ date, invoice_no: invoice, customer, total, items });
}

function _renderSummaryData(data) {
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const prevDate  = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const prevMonth = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0');

  const cur  = data.find(r => r.month === thisMonth);
  const prev = data.find(r => r.month === prevMonth);

  const incomeVal  = parseFloat(cur  ? cur.total_income  || 0 : 0);
  const expenseVal = parseFloat(cur  ? cur.total_expense || 0 : 0);
  const prevInc    = parseFloat(prev ? prev.total_income  || 0 : 0);
  const prevExp    = parseFloat(prev ? prev.total_expense || 0 : 0);
  const net        = incomeVal - expenseVal;
  const prevNet    = prevInc - prevExp;

  document.getElementById('total-income').textContent  = '฿' + incomeVal.toLocaleString();
  document.getElementById('total-expense').textContent = '฿' + expenseVal.toLocaleString();

  const netEl = document.getElementById('net-profit');
  if (netEl) {
    netEl.textContent = '฿' + Math.abs(net).toLocaleString();
    netEl.style.color = net >= 0 ? '#1D9E75' : '#E53935';
  }

  function setKpiChange(id, cur, prev) {
    const el = document.getElementById(id);
    if (!el) return;
    if (!prev || prev === 0) { el.textContent = ''; return; }
    const pct = Math.round((cur - prev) / Math.abs(prev) * 100);
    const up  = pct >= 0;
    el.textContent = (up ? '▲ +' : '▼ ') + pct + '% vs เดือนก่อน';
    el.className   = 'kpi-change ' + (up ? 'up' : 'down');
  }
  setKpiChange('kpi-income-change',  incomeVal,  prevInc);
  setKpiChange('kpi-expense-change', expenseVal, prevExp);
  setKpiChange('kpi-profit-change',  net,        prevNet);

  renderChart(data);
  renderMarginCard(incomeVal, expenseVal);
}

function loadDashboard() {
  google.script.run
    .withSuccessHandler(function(res) {
      const data = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      _renderSummaryData(data);
    })
    .withFailureHandler(function() {})
    .getSummary();

  loadPosStatus();
  loadStockAlert();
  loadTopMenu();
}
function renderChart(data) {
  const last6  = data.slice(0,6).reverse();
  const maxVal = Math.max(...last6.map(r => Math.max(parseFloat(r.total_income||0), parseFloat(r.total_expense||0))), 1);
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const barsEl   = document.getElementById('bars');
  const labelsEl = document.getElementById('bar-labels');
  barsEl.innerHTML = ''; labelsEl.innerHTML = '';
  last6.forEach(r => {
    const incH = Math.max(Math.round((parseFloat(r.total_income||0)/maxVal)*75), 3);
    const expH = Math.max(Math.round((parseFloat(r.total_expense||0)/maxVal)*75), 3);
    barsEl.innerHTML   += `<div class="bar-group"><div class="bar i" style="height:${incH}px"></div><div class="bar e" style="height:${expH}px"></div></div>`;
    labelsEl.innerHTML += `<div class="bar-label">${months[parseInt(r.month.split('-')[1])-1]}</div>`;
  });
}

function renderHistory() {
  const search   = document.getElementById('search-input').value.toLowerCase();
  const dateFrom = (document.getElementById('hist-date-from') || {}).value || '';
  const dateTo   = (document.getElementById('hist-date-to')   || {}).value || '';
  const icons    = { ตลาด:'🛒', ห้าง:'🏬', Online:'🌐', Shopee:'🛍', รายรับ:'💰' };
  const colors   = { ตลาด:'#E1F5EE', ห้าง:'#E6F1FB', Online:'#FAEEDA', Shopee:'#FAECE7', รายรับ:'#E1F5EE' };
  const filtered = allHistory.filter(item => {
    if (currentFilter === 'income'  && item.type !== 'income')  return false;
    if (currentFilter === 'expense' && item.type !== 'expense') return false;
    if (['ตลาด','ห้าง','Shopee','Online'].includes(currentFilter) && item.source !== currentFilter) return false;
    if (dateFrom && item.date && item.date < dateFrom) return false;
    if (dateTo   && item.date && item.date > dateTo)   return false;
    if (search) {
      const hay = (item.source + (item.note||'') + (item.customer||'') + (item.invoice_no||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
  const el = document.getElementById('history-list');
  if (filtered.length === 0) { el.innerHTML = '<div class="empty">ไม่พบรายการ</div>'; return; }
  el.innerHTML = filtered.map(item => {
    const icon   = icons[item.source]  || '📋';
    const bg     = colors[item.source] || '#f5f5f5';
    const name   = item.type === 'income' ? (item.invoice_no + ' · ' + item.customer) : (item.note || item.source);
    const amount = item.type === 'income'
      ? `<span class="income-val">+฿${parseFloat(item.total).toLocaleString()}</span>`
      : `<span class="expense-val">-฿${parseFloat(item.total).toLocaleString()}</span>`;
    const badge  = item.type === 'income'
      ? `<div class="badge badge-income">รายรับ</div>`
      : `<div class="badge badge-expense">${item.source}</div>`;
    return `
    <div class="txn-item">
      <div class="txn-left">
        <div class="txn-icon" style="background:${bg}">${icon}</div>
        <div>
          <div class="txn-name">${name}</div>
          <div class="txn-meta">${item.date}</div>
          <button class="btn-detail"
            onclick="openDetail('${item.type}',${item.id},'${name}','${item.date}',${item.total})">
            ดูรายการ
          </button>
        </div>
      </div>
      <div style="text-align:right;">${amount}${badge}</div>
    </div>`;
  }).join('');
}

function renderRecentList() {
  const icons  = { ตลาด:'🛒', ห้าง:'🏬', Online:'🌐', Shopee:'🛍', รายรับ:'💰' };
  const iconBg = { ตลาด:'#E8F8F2', ห้าง:'#E6F1FB', Online:'#FDF7E3', Shopee:'#FAECE7', รายรับ:'#E8F8F2' };
  const el     = document.getElementById('recent-list');
  const recent = allHistory.slice(0,5);
  if (recent.length === 0) { el.innerHTML = '<div class="empty">ยังไม่มีรายการ</div>'; return; }
  el.innerHTML = recent.map(item => {
    const icon   = item.type === 'income' ? '💰' : (icons[item.source] || '🛒');
    const bg     = item.type === 'income' ? '#E8F8F2' : (iconBg[item.source] || '#FAECE7');
    const name   = item.type === 'income' ? (item.invoice_no || 'รายรับ') : (item.note || item.source);
    const amountText = item.type === 'income'
      ? `<span style="color:#1D9E75;">+฿${parseFloat(item.total).toLocaleString()}</span>`
      : `<span style="color:#D85A30;">-฿${parseFloat(item.total).toLocaleString()}</span>`;
    return `
      <div class="dash-txn-row">
        <div class="dash-txn-icon" style="background:${bg};">${icon}</div>
        <div class="dash-txn-info">
          <div class="dash-txn-name">${name}</div>
          <div class="dash-txn-date">${item.date}</div>
        </div>
        <div class="dash-txn-amount">${amountText}</div>
      </div>`;
  }).join('');

  // ── Today stats from allHistory ──
  const todayStr = new Date().toISOString().split('T')[0];
  const todayIncome = allHistory.filter(i => i.type === 'income' && i.date && i.date.startsWith(todayStr));
  const todayTotal  = todayIncome.reduce((s,i) => s + parseFloat(i.total||0), 0);
  const orderCount  = todayIncome.length;

  const now  = new Date();
  const ym   = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  const days = now.getDate();
  const monthIncome = allHistory.filter(i => i.type === 'income' && i.date && i.date.startsWith(ym));
  const monthTotal  = monthIncome.reduce((s,i) => s + parseFloat(i.total||0), 0);
  const avgPerDay   = days > 0 ? Math.round(monthTotal / days) : 0;

  const se = function(id, txt) { const e = document.getElementById(id); if(e) e.textContent = txt; };
  se('stat-today',  todayTotal > 0 ? '฿' + todayTotal.toLocaleString() : '—');
  se('stat-orders', orderCount > 0 ? orderCount : '—');
  se('stat-avg',    avgPerDay  > 0 ? '฿' + avgPerDay.toLocaleString()  : '—');
}

function renderMarginCard(income, expense) {
  const pct    = income > 0 ? Math.round((income - expense) / income * 100) : 0;
  const profit = income - expense;
  const circumf = 175.9;
  const offset  = circumf - (circumf * Math.max(0, Math.min(pct, 100)) / 100);

  const se = function(id, txt) { const e = document.getElementById(id); if(e) e.textContent = txt; };
  se('margin-pct',      pct + '%');
  se('margin-sub',      'กำไร ฿' + Math.abs(profit).toLocaleString() + ' จาก ฿' + income.toLocaleString());
  se('margin-arc-text', pct + '%');
  se('stat-margin',     pct + '%');

  const arc = document.getElementById('margin-arc');
  if (arc) arc.setAttribute('stroke-dashoffset', offset.toFixed(1));
}

function _renderPosStatus(sessions) {
  const openCount = sessions.length;
  const badge   = document.getElementById('dash-pos-badge');
  const countEl = document.getElementById('dash-pos-count');
  if (badge)   badge.style.display = openCount > 0 ? 'flex' : 'none';
  if (countEl) countEl.textContent = openCount;

  const grid  = document.getElementById('pos-status-grid');
  const chips = document.getElementById('table-chips');
  if (!grid) return;

  const pendingCount = sessions.reduce(function(s, sess) {
    return s + (sess.items || []).filter(function(i) { return i.status === 'pending'; }).length;
  }, 0);

  grid.innerHTML =
    `<div class="pos-stat-card psc-open">
      <div class="pos-stat-num pos-num-open">${openCount}</div>
      <div class="pos-stat-label">โต๊ะเปิดอยู่</div>
    </div>
    <div class="pos-stat-card psc-pending">
      <div class="pos-stat-num pos-num-pending">${pendingCount}</div>
      <div class="pos-stat-label">รายการรอทำ</div>
    </div>
    <div class="pos-stat-card">
      <div class="pos-stat-num pos-num-served">${sessions.length}</div>
      <div class="pos-stat-label">Session วันนี้</div>
    </div>`;

  if (chips) {
    chips.innerHTML = sessions.length === 0
      ? '<div class="tc-v4 tc-v4-empty"><span class="tc-v4-dot"></span>ไม่มีโต๊ะเปิด</div>'
      : sessions.slice(0, 6).map(function(s) {
          const total = (s.items || []).reduce(function(sum, i) {
            return sum + parseFloat(i.price||0) * (parseInt(i.qty)||1);
          }, 0);
          return `<div class="tc-v4 tc-v4-open"><span class="tc-v4-dot"></span>${escHtml(s.table_name)} · ฿${total.toLocaleString()}</div>`;
        }).join('');
  }
}

// ─── DASHBOARD QUERY CARD ─────────────────────────────────────────────────────
function dashQuery(period, tabEl, isCustomApply) {
  // Active tab
  document.querySelectorAll('.query-tab').forEach(t => t.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  else if (period === 'custom') {
    const tabs = document.querySelectorAll('.query-tab');
    tabs[4] && tabs[4].classList.add('active');
  }

  // Custom date row toggle
  const customRow = document.getElementById('query-custom-row');
  if (period === 'custom' && !isCustomApply) {
    customRow.style.display = 'flex';
    document.getElementById('query-result').style.display = 'none';
    return;
  }
  customRow.style.display = (period === 'custom') ? 'flex' : 'none';

  // Compute date range
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  let from, to, prevFrom, prevTo, label, days;

  if (period === 'today') {
    from = to = todayStr;
    const prev = new Date(now); prev.setDate(prev.getDate() - 1);
    prevFrom = prevTo = prev.toISOString().split('T')[0];
    label = 'วันนี้ · เทียบกับเมื่อวาน'; days = 1;
  } else if (period === 'yesterday') {
    const y = new Date(now); y.setDate(y.getDate() - 1);
    from = to = y.toISOString().split('T')[0];
    const py = new Date(now); py.setDate(py.getDate() - 2);
    prevFrom = prevTo = py.toISOString().split('T')[0];
    label = 'เมื่อวาน · เทียบกับ 2 วันก่อน'; days = 1;
  } else if (period === 'week') {
    const d = new Date(now); d.setDate(d.getDate() - 6);
    from = d.toISOString().split('T')[0]; to = todayStr;
    const pw1 = new Date(now); pw1.setDate(pw1.getDate() - 13);
    const pw2 = new Date(now); pw2.setDate(pw2.getDate() - 7);
    prevFrom = pw1.toISOString().split('T')[0]; prevTo = pw2.toISOString().split('T')[0];
    label = from + ' — ' + to + ' · เทียบกับสัปดาห์ก่อน'; days = 7;
  } else if (period === 'month') {
    from = todayStr.slice(0,7) + '-01'; to = todayStr;
    const pm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const pm2 = new Date(now.getFullYear(), now.getMonth(), 0);
    prevFrom = pm.toISOString().split('T')[0]; prevTo = pm2.toISOString().split('T')[0];
    label = 'เดือนนี้ · เทียบกับเดือนก่อน'; days = now.getDate();
  } else if (period === 'custom') {
    from = document.getElementById('query-date-from').value;
    to   = document.getElementById('query-date-to').value;
    if (!from || !to) { showToast('กรุณาเลือกวันเริ่มและสิ้นสุด'); return; }
    label = from + ' — ' + to;
    const d1 = new Date(from), d2 = new Date(to);
    days = Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
    prevFrom = prevTo = null;
  }

  // Filter allHistory
  const inPeriod = allHistory.filter(h => h.date >= from && h.date <= to);
  const prevPeriod = (prevFrom && prevTo) ? allHistory.filter(h => h.date >= prevFrom && h.date <= prevTo) : [];

  const income    = inPeriod.filter(h => h.type === 'income').reduce((s,h) => s + h.total, 0);
  const expense   = inPeriod.filter(h => h.type === 'expense').reduce((s,h) => s + h.total, 0);
  const profit    = income - expense;
  const orders    = inPeriod.filter(h => h.type === 'income').length;
  const avgBill   = orders > 0 ? Math.round(income / orders) : 0;
  const perDay    = days > 0 ? (orders / days).toFixed(1) : 0;

  const prevIncome  = prevPeriod.filter(h => h.type === 'income').reduce((s,h) => s + h.total, 0);
  const prevExpense = prevPeriod.filter(h => h.type === 'expense').reduce((s,h) => s + h.total, 0);

  function pct(cur, prev) {
    if (!prev || prev === 0) return '';
    const p = Math.round((cur - prev) / prev * 100);
    return (p >= 0 ? '▲ ' : '▼ ') + Math.abs(p) + '%';
  }
  function chgColor(cur, prev, good) {
    if (!prev) return '';
    return (cur >= prev) === good ? 'color:#1D9E75' : 'color:#D85A30';
  }

  // Top menu from income items (use order_items via session cache won't work offline; approximate from income_invoice_items summary not available — use session cache items)
  const menuMap = {};
  allHistory.filter(h => h.type === 'income' && h.date >= from && h.date <= to).forEach(h => {
    // income records have customer but not items — skip detailed breakdown
  });

  // Render
  document.getElementById('query-period-label').textContent = label;
  document.getElementById('q-income').textContent  = '฿' + income.toLocaleString();
  document.getElementById('q-expense').textContent = '฿' + expense.toLocaleString();
  document.getElementById('q-profit').textContent  = '฿' + profit.toLocaleString();
  document.getElementById('q-orders').textContent  = orders;
  document.getElementById('q-avg').textContent     = '฿' + avgBill.toLocaleString();
  document.getElementById('q-perday').textContent  = perDay;

  const incChg = pct(income, prevIncome);
  const expChg = pct(expense, prevExpense);
  const prfChg = prevIncome ? (Math.round(profit / income * 100) + '% margin') : (income > 0 ? Math.round(profit / income * 100) + '% margin' : '—');
  document.getElementById('q-income-chg').innerHTML  = incChg ? `<span style="${chgColor(income,prevIncome,true)}">${incChg}</span>` : '';
  document.getElementById('q-expense-chg').innerHTML = expChg ? `<span style="${chgColor(expense,prevExpense,false)}">${expChg}</span>` : '';
  document.getElementById('q-profit-chg').textContent = income > 0 ? Math.round(profit / income * 100) + '% margin' : '—';

  // Top menu — ดึงจาก server ตามช่วงวันที่จริง
  const topMenuEl = document.getElementById('q-topmenu');
  topMenuEl.innerHTML = '<div style="font-size:12px;color:#aaa;padding:8px 0;">กำลังโหลด...</div>';
  document.getElementById('query-result').style.display = 'block';

  google.script.run
    .withSuccessHandler(function(res) {
      const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
      const items = (res && res.data) ? res.data : [];
      const maxQ = items[0] ? items[0].count : 1;
      topMenuEl.innerHTML = items.length > 0
        ? items.map(function(item, i) {
            return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;">' +
              '<span style="width:20px;text-align:center;font-size:14px;">' + (medals[i] || (i+1)) + '</span>' +
              '<span style="flex:1;font-size:13px;color:#333;">' + escHtml(item.name) + '</span>' +
              '<div style="width:60px;height:5px;background:#f0f0f0;border-radius:3px;">' +
                '<div style="width:' + Math.round(item.count/maxQ*100) + '%;height:5px;background:#1D9E75;border-radius:3px;"></div>' +
              '</div>' +
              '<span style="font-size:12px;color:#888;width:48px;text-align:right;">' + item.count + ' จาน</span>' +
            '</div>';
          }).join('')
        : '<div style="font-size:12px;color:#aaa;padding:8px 0;">ไม่มีข้อมูลเมนูในช่วงนี้</div>';
    })
    .withFailureHandler(function() {
      topMenuEl.innerHTML = '<div style="font-size:12px;color:#aaa;">โหลดข้อมูลไม่สำเร็จ</div>';
    })
    .getMenuRankByPeriod({ dateFrom: from, dateTo: to });
}

function doSearch() {
  const keyword = document.getElementById('search-keyword').value.trim();
  if (keyword.length < 1) {
    document.getElementById('search-results').innerHTML = `
      <div class="search-empty">
        <div class="search-empty-icon">🔍</div>
        <div class="search-empty-text">พิมพ์ชื่อสินค้าเพื่อค้นหา</div>
        <div class="search-empty-sub">เช่น ผักบุ้ง, หมูสับ, แดงกวา</div>
      </div>`;
    document.getElementById('search-summary').style.display       = 'none';
    document.getElementById('search-result-header').style.display = 'none';
    return;
  }

  document.getElementById('search-results').innerHTML =
    '<div class="loading">กำลังค้นหา...</div>';

  const params = {
    keyword:  keyword,
    source:   searchSource || null,
    dateFrom: document.getElementById('search-date-from').value || null,
    dateTo:   document.getElementById('search-date-to').value   || null
  };

  google.script.run
    .withSuccessHandler(function(res) {
      const items = Array.isArray(res) ? res
        : (res && res.success ? res.data : []);
      renderSearchResults(items, keyword);
    })
    .withFailureHandler(function() {
      document.getElementById('search-results').innerHTML =
        '<div class="search-empty"><div class="search-empty-text">เกิดข้อผิดพลาด</div></div>';
    })
    .searchItems(params);
}

function renderSearchResults(items, keyword) {
  const summaryEl      = document.getElementById('search-summary');
  const headerEl       = document.getElementById('search-result-header');
  const resultsEl      = document.getElementById('search-results');

  if (items.length === 0) {
    summaryEl.style.display = 'none';
    headerEl.style.display  = 'none';
    resultsEl.innerHTML = `
      <div class="search-empty">
        <div class="search-empty-icon">🔍</div>
        <div class="search-empty-text">ไม่พบ "${keyword}"</div>
        <div class="search-empty-sub">ลองค้นหาด้วยคำอื่น</div>
      </div>`;
    return;
  }

  // Summary
  const totalAmt  = items.reduce((s, i) => s + parseFloat(i.amount  || 0), 0);
  const totalQty  = items.reduce((s, i) => s + parseFloat(i.quantity || 0), 0);
  const unit      = items[0].unit || '';
  document.getElementById('s-count').textContent = items.length + ' ครั้ง';
  document.getElementById('s-qty').textContent   = totalQty.toFixed(2) + ' ' + unit;
  document.getElementById('s-total').textContent = '฿' + totalAmt.toLocaleString();
  summaryEl.style.display = 'block';

  // Header
  document.getElementById('s-result-title').textContent  = 'ผลการค้นหา "' + keyword + '"';
  document.getElementById('s-result-count').textContent  = items.length + ' รายการ';
  headerEl.style.display = 'flex';

  // Highlight
  const re  = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  const colors = { ตลาด:'badge-market', ห้าง:'badge-market', Shopee:'badge-expense', Online:'badge-income' };

  resultsEl.innerHTML = items.map(item => {
    const highlighted = item.description.replace(re, '<mark>$1</mark>');
    const badgeClass  = colors[item.source_name] || 'badge-expense';
    return `
      <div class="search-item">
        <div class="search-item-top">
          <div class="search-item-name">${highlighted}</div>
          <div class="search-item-price">฿${parseFloat(item.amount).toLocaleString()}</div>
        </div>
        <div class="search-item-meta">
          <span class="search-item-date">${item.expense_date}</span>
          <span class="item-badge ${badgeClass}">${item.source_name}</span>
          <span class="search-item-qty">
            ${parseFloat(item.quantity)} ${item.unit || ''} × ฿${parseFloat(item.unit_price).toLocaleString()}
          </span>
        </div>
      </div>`;
  }).join('');
}

      }
    })

function loadMenuItems(forceReload = false, retryCount = 0) {
  debugLog('loadMenuItems called', {forceReload, retryCount, cached: allMenuItems.length});
  
  if (!forceReload && allMenuItems.length > 0) {
    debugLog('using cache', allMenuItems.length);
    renderFilteredMenus();
    return;
  }
  
  const listEl = document.getElementById('menu-list');
  listEl.innerHTML = '<div class="loading">กำลังโหลด...' +
    (retryCount > 0 ? ' (ลองใหม่ ' + retryCount + ')' : '') + '</div>';

  let done = false;
  const startTime = Date.now();

  const timer = setTimeout(function() {
    if (done) return;
    done = true;
    debugLog('TIMEOUT after 10s', retryCount);
    
    if (retryCount < 2) {
      loadMenuItems(true, retryCount + 1);
    } else {
      showRetryButton('Timeout - API ไม่ตอบใน 10 วิ');
      showToast('❌ โหลดเมนูไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ');
    }
  }, 10000);

  google.script.run
    .withSuccessHandler(function(res) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      const elapsed = Date.now() - startTime;
      
      const list = Array.isArray(res) ? res : (res && res.data ? res.data : []);
      debugLog('SUCCESS', {
        elapsed: elapsed + 'ms',
        type: typeof res,
        isArray: Array.isArray(res),
        length: list.length,
        sample: list[0] ? list[0].name : 'EMPTY',
        raw: res === null ? 'NULL' : res === undefined ? 'UNDEFINED' : 'OK'
      });
      
      // ⚠️ ป้องกัน: ถ้าได้ [] แต่ก่อนหน้านี้มีข้อมูล อย่าทับ
      if (list.length === 0 && allMenuItems.length > 0 && !forceReload) {
        debugLog('REJECT empty response - keep cache', allMenuItems.length);
        renderFilteredMenus();
        return;
      }
      
      // ⚠️ ป้องกัน: ถ้าได้ [] ลอง retry 1 รอบ
      if (list.length === 0 && retryCount < 2) {
        debugLog('Got empty array, retrying...', retryCount + 1);
        setTimeout(function() {
          loadMenuItems(true, retryCount + 1);
        }, 800);
        return;
      }
      
      allMenuItems = list;
      renderFilteredMenus();
      loadMenuImagesLazy();
    })
    .withFailureHandler(function(err) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      debugLog('FAILED', err && err.message ? err.message : String(err));
      
      if (retryCount < 2) {
        setTimeout(function() {
          loadMenuItems(true, retryCount + 1);
        }, 500);
      } else {
        showRetryButton(err && err.message ? err.message : 'Network error');
        showToast('❌ โหลดเมนูไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ');
      }
    })
    .getMenuItems();
}

function showRetryButton(errMsg) {
  document.getElementById('menu-list').innerHTML =
    '<div class="empty" style="padding:40px 20px;">' +
    '<div style="font-size:36px;margin-bottom:10px;">⚠️</div>' +
    '<div style="font-size:14px;margin-bottom:6px;">โหลดเมนูไม่สำเร็จ</div>' +
    '<div style="font-size:11px;color:#bbb;margin-bottom:14px;">' + errMsg + '</div>' +
    '<button onclick="loadMenuItems(true)" ' +
    'style="padding:10px 24px;background:#1D9E75;color:#fff;border:none;' +
    'border-radius:10px;font-size:13px;cursor:pointer;font-family:Sarabun,sans-serif;">' +
    '🔄 ลองอีกครั้ง</button></div>';
}

function posShowLoading(show) {

}

function posSetStep(n, state, statusText) {
  const row = document.getElementById('pos-s' + n);
  const st  = document.getElementById('pos-s' + n + '-status');
  if (!row || !st) return;
  row.className = 'pos-step' + (state === 'active' ? ' ps-active' : state === 'done' ? ' ps-done' : '');
  const icon = row.querySelector('.pos-step-icon');
  icon.className = 'pos-step-icon ' + (state === 'active' ? 'psi-active' : state === 'done' ? 'psi-done' : 'psi-wait');
  icon.textContent = state === 'done' ? '✓' : (n + '');
  st.textContent = statusText;
}

function posSetPct(pct) {
  const num  = document.getElementById('pos-pct-num');
  const fill = document.getElementById('pos-ring-fill');
  if (num)  num.textContent = Math.round(pct) + '%';
  if (fill) fill.style.strokeDashoffset = 289 * (1 - pct / 100);
}

function loadMenuItemsForPOS(retryCount = 0) {
  debugLog('loadMenuItemsForPOS called', {retryCount, cached: allMenuItems.length});
  
  const sub = document.getElementById('pos-load-sub');

  posSetPct(10);
  posSetStep(1, 'active', 'กำลังเชื่อมต่อ...');
  if (sub) sub.textContent = retryCount > 0
    ? 'ลองใหม่ครั้งที่ ' + retryCount + '...'
    : 'กำลังเชื่อมต่อฐานข้อมูล...';

  setTimeout(function() {
    posSetStep(1, 'done', 'สำเร็จ');
    posSetPct(30);
    posSetStep(2, 'active', 'กำลังดึงข้อมูล...');
    if (sub) sub.textContent = 'กำลังโหลดรายการเมนู...';

    let done = false;
    const startTime = Date.now();

    // Timeout 12 วินาที
    const timer = setTimeout(function() {
      if (done) return;
      done = true;
      debugLog('POS TIMEOUT after 12s', retryCount);
      
      if (retryCount < 2) {
        loadMenuItemsForPOS(retryCount + 1);
      } else {
        posPOSError('Timeout - API ไม่ตอบ');
      }
    }, 30000);

    google.script.run
      .withSuccessHandler(function(res) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        const elapsed = Date.now() - startTime;
        
        const list = Array.isArray(res) ? res : (res && res.data ? res.data : []);
        debugLog('POS SUCCESS', {
          elapsed: elapsed + 'ms',
          length: list.length,
          raw: res === null ? 'NULL' : res === undefined ? 'UNDEFINED' : 'OK'
        });

        // ⚠️ ป้องกัน: empty response ทั้งที่ cache มี → ใช้ cache
        if (list.length === 0 && allMenuItems.length > 0) {
          debugLog('POS REJECT empty - keep cache', allMenuItems.length);
          posFinishLoading(sub);
          return;
        }
        
        // ⚠️ ป้องกัน: ได้ [] ลอง retry
        if (list.length === 0 && retryCount < 2) {
          debugLog('POS Got empty, retrying...', retryCount + 1);
          if (sub) sub.textContent = 'ข้อมูลว่าง กำลังลองใหม่...';
          setTimeout(function() {
            loadMenuItemsForPOS(retryCount + 1);
          }, 800);
          return;
        }

        allMenuItems = list;
        const count = allMenuItems.length;
        posSetPct(75);
        posSetStep(2, 'done', count + ' รายการ พร้อมแล้ว');
        posFinishLoading(sub);

        // Lazy load รูปแบบ background ไม่บล็อก UI
        loadMenuImagesLazy();
      })
      .withFailureHandler(function(err) {
        if (done) return;
        done = true;
        clearTimeout(timer);
        debugLog('POS FAILED', err && err.message ? err.message : String(err));

        if (retryCount < 2) {
          setTimeout(function() {
            loadMenuItemsForPOS(retryCount + 1);
          }, 500);
        } else {
          posPOSError(err && err.message ? err.message : 'Network error');
        }
      })
      .getMenuItems();
  }, 300);
}

// โหลดรูปเมนูแบบ lazy — ไม่บล็อก UI
function loadMenuImagesLazy() {
  const needsImage = allMenuItems.filter(function(m) {
    return !m._imageChecked && (!m.image_url || m.image_url === '');
  });
  if (needsImage.length === 0) return;

  debugLog('Lazy loading images', needsImage.length);

  const batchSize = 30;
  const batch = needsImage.slice(0, batchSize);
  const ids = batch.map(function(m) { return m.id; });

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) return;
      const data = res.data || {};

      batch.forEach(function(m) {
        var url = data[m.id] || data[String(m.id)];
        if (url) {
          m.image_url = url;
        } else {
          m._imageChecked = true; // ตรวจแล้ว — ไม่มีรูปใน Sheets → ไม่ queue ซ้ำ
        }
      });

      debugLog('Lazy loaded images', Object.keys(data).length);
      refreshVisibleImages();

      if (needsImage.length > batchSize) {
        setTimeout(loadMenuImagesLazy, 500);
      }
    })
    .withFailureHandler(function(err) {
      debugLog('Lazy load failed', err && err.message);
      batch.forEach(function(m) { m._imageChecked = true; }); // หยุด retry ถ้า error
    })
    .getMenuImages({ ids: ids });
}

/**
 * Resize + compress รูปบน client ก่อนแปลงเป็น base64
 * @param {File} file - File object จาก input[type=file]
 * @param {number} maxSize - ขนาดด้านยาวสุด (px) เช่น 800
 * @param {number} quality - JPEG quality 0-1 เช่น 0.85
 * @param {Function} callback - รับ base64 string
 */
function resizeImage(file, maxSize, quality, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      // คำนวณขนาดใหม่ รักษาสัดส่วน
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) {
        h = Math.round(h * maxSize / w);
        w = maxSize;
      } else if (h > maxSize) {
        w = Math.round(w * maxSize / h);
        h = maxSize;
      }
      
      // วาดลง canvas
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; // กันพื้นหลังโปร่งใส
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);
      
      // Export เป็น JPEG (เล็กกว่า PNG มาก)
      const b64 = canvas.toDataURL('image/jpeg', quality);
      callback(b64);
    };
    img.onerror = function() {
      showToast('ไม่สามารถอ่านรูปได้ กรุณาลองรูปอื่น');
    };
    img.src = e.target.result;
  };
  reader.onerror = function() {
    showToast('อ่านไฟล์ไม่สำเร็จ');
  };
  reader.readAsDataURL(file);
}

function previewEditMenuImage(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];

  if (!file.type.startsWith('image/')) {
    showToast('กรุณาเลือกไฟล์รูปภาพ');
    return;
  }

  showToast('กำลังย่อรูป...');
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
      else if (h > maxSize)     { w = Math.round(w * maxSize / h); h = maxSize; }

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('edit-menu-image-b64').value = b64;
      const tag = document.getElementById('edit-menu-img-tag');
      const ph  = document.getElementById('edit-menu-img-placeholder');
      tag.src = b64; tag.style.display = 'block'; ph.style.display = 'none';
      showToast('โหลดรูปสำเร็จ');
    };
    img.onerror = function() { showToast('อ่านรูปไม่ได้ ลองรูปอื่น'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function previewMenuImage(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];

  if (!file.type.startsWith('image/')) {
    showToast('กรุณาเลือกไฟล์รูปภาพ');
    return;
  }

  showToast('กำลังย่อรูป...');
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
      else if (h > maxSize)     { w = Math.round(w * maxSize / h); h = maxSize; }

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('menu-img-tag').src = b64;
      document.getElementById('menu-img-tag').style.display = 'block';
      document.getElementById('menu-img-placeholder').style.display = 'none';
      document.getElementById('menu-image-b64').value = b64;
      showToast('โหลดรูปสำเร็จ');
    };
    img.onerror = function() { showToast('อ่านรูปไม่ได้ ลองรูปอื่น'); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadMenuCategories() {
  google.script.run
    .withSuccessHandler(function(res) {
      menuCategories = Array.isArray(res) ? res : (res.data || []);
      renderCategoryDropdown();
      renderCategoryFilter();
    })
    .getMenuCategories();
}

function renderCategoryDropdown() {
  const sel = document.getElementById('menu-category');
  if (!sel) return;
  sel.innerHTML = '<option value="">-- เลือกประเภท --</option>' +
    menuCategories.map(c =>
      `<option value="${c.name}">${c.name}</option>`
    ).join('');
}

function renderCategoryFilter() {
  const row = document.getElementById('menu-filter-row');
  if (!row) return;
  row.innerHTML = `<div class="menu-chip active" onclick="filterMenuByCategory(this,'')">ทั้งหมด</div>` +
    menuCategories.map(c =>
      `<div class="menu-chip" onclick="filterMenuByCategory(this,'${c.name}')">${c.name}</div>`
    ).join('');
}


// กรองจาก cache — ไม่ต้องโหลดใหม่
function filterMenuByCategory(el, category) {
  document.querySelectorAll('.menu-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentMenuCategory = category;
  renderFilteredMenus(); // ← กรองทันที ไม่ reload
}

function renderFilteredMenus() {
  let items = allMenuItems;
  if (currentMenuCategory) {
    items = allMenuItems.filter(i => {
      const catName = i.menu_categories
        ? i.menu_categories.name
        : (i.category || '');
      return catName === currentMenuCategory;
    });
  }
  items = items.slice().sort((a, b) => a.name.localeCompare(b.name, 'th'));
  renderMenuList(items);
  document.getElementById('menu-count').textContent = items.length + ' เมนู';
}

  if (!name) { showToast('กรุณากรอกชื่อประเภท'); return; }

  google.script.run

// ---- EDIT EXPENSE ----
const UNITS = [
  'Pcs','KG','G','L','ML',
  'ช้อนโต๊ะ','ช้อนชา','ถ้วย',
  'ลัง','ลัง/โหล','ถุง','แพ็ค','กล่อง',
  'มัด','กำ','ขวด','กระป๋อง',
  'แผ่น','ชิ้น','หัว','ลูก','ใบ','อื่นๆ'
];

function openEditExpense() {
  const m = currentDetailMeta;
  // สลับ header
  document.getElementById('modal-header-view').style.display = 'none';
  document.getElementById('modal-header-edit').style.display = 'flex';
  document.getElementById('modal-edit-subtitle').textContent =
    m.title + ' · ' + m.subtitle;

  // ซ่อน view / แสดง edit
  document.getElementById('modal-body').style.display      = 'none';
  document.getElementById('modal-total').style.display     = 'none';
  document.getElementById('modal-edit-form').style.display = 'block';
  document.getElementById('modal-edit-actions').style.display = 'grid';

  // prefill header fields
  document.getElementById('edit-date').value = m.subtitle.split(' · ')[0] || '';
  document.getElementById('edit-note').value = m.note || '';

  // ซ่อน/แสดง note field ตาม type
  const noteEl    = document.getElementById('edit-note');
  const noteLabel = noteEl.previousElementSibling;
  const isIncome  = m.type === 'income';
  noteEl.style.display    = isIncome ? 'none' : '';
  noteLabel.style.display = isIncome ? 'none' : '';

  // prefill items จาก modal-body ที่โหลดไว้แล้ว
  const existingItems = [];
  document.querySelectorAll('#modal-body .modal-item').forEach(row => {
    const name  = row.querySelector('.modal-item-name')?.textContent.trim() || '';
    const meta  = row.querySelector('.modal-item-meta')?.textContent.trim() || '';
    // parse "2 Pcs × ฿65"
    const match = meta.match(/^([\d.]+)\s+(.+?)\s+[×x]\s+฿([\d,.]+)/);
    existingItems.push({
      description: name,
      quantity:    match ? match[1] : '1',
      unit:        match ? match[2] : 'Pcs',
      unit_price:  match ? match[3].replace(/,/g,'') : '0'
    });
  });

  document.getElementById('edit-items').innerHTML = '';
  existingItems.forEach(item => addEditItem(item));
  calcEditTotal();
}

function addEditItem(prefill) {
  const wrap = document.getElementById('edit-items');
  const row  = document.createElement('div');
  row.style.cssText = 'display:grid;grid-template-columns:1fr 65px 90px 65px 22px;gap:4px;margin-bottom:5px;align-items:center;';
  const unitOpts = UNITS.map(u =>
    `<option value="${u}" ${prefill && prefill.unit===u ? 'selected' : ''}>${u}</option>`
  ).join('');
  row.innerHTML = `
    <input class="form-input" type="text"
      placeholder="รายการ" value="${prefill ? prefill.description : ''}"
      oninput="calcEditTotal()" style="font-size:12px;padding:7px 6px;">
    <input class="form-input" type="number"
      placeholder="จำนวน" value="${prefill ? prefill.quantity : '1'}"
      min="0" step="any" oninput="calcEditTotal()"
      style="font-size:12px;padding:7px 4px;">
    <select class="form-input" style="font-size:11px;padding:7px 2px;"
      onchange="calcEditTotal()">${unitOpts}</select>
    <input class="form-input" type="number"
      placeholder="ราคา" value="${prefill ? prefill.unit_price : ''}"
      min="0" step="any" oninput="calcEditTotal()"
      style="font-size:12px;padding:7px 4px;">
    <span onclick="this.closest('div').remove();calcEditTotal()"
      style="color:#E24B4A;font-size:18px;cursor:pointer;text-align:center;line-height:1;">×</span>
  `;
  wrap.appendChild(row);
}

function calcEditTotal() {
  let total = 0;
  document.querySelectorAll('#edit-items > div').forEach(row => {
    const inputs = row.querySelectorAll('input[type=number]');
    total += (parseFloat(inputs[0].value)||0) * (parseFloat(inputs[1].value)||0);
  });
  const isIncome = currentDetailMeta && currentDetailMeta.type === 'income';
  const el = document.getElementById('edit-total-display');
  el.textContent = (isIncome ? '+' : '-') + '฿' +
    total.toLocaleString('th', {minimumFractionDigits:2, maximumFractionDigits:2});
  el.style.color = isIncome ? '#1D9E75' : '#993C1D';
}

function cancelEdit() {
  // กลับไป view mode
  document.getElementById('modal-header-view').style.display = 'flex';
  document.getElementById('modal-header-edit').style.display = 'none';
  document.getElementById('modal-body').style.display        = 'block';
  document.getElementById('modal-total').style.display       = 'flex';
  document.getElementById('modal-edit-form').style.display   = 'none';
  document.getElementById('modal-edit-actions').style.display = 'none';
}

function submitEditExpense() {
  const m    = currentDetailMeta;
  const date = document.getElementById('edit-date').value;
  const note = document.getElementById('edit-note').value;
  if (!date) { showToast('กรุณาเลือกวันที่'); return; }

  const items = [];
  let total = 0;
  document.querySelectorAll('#edit-items > div').forEach(row => {
    const desc   = row.querySelectorAll('input[type=text]')[0].value.trim();
    const inputs = row.querySelectorAll('input[type=number]');
    const unit   = row.querySelector('select').value;
    const qty    = parseFloat(inputs[0].value) || 1;
    const price  = parseFloat(inputs[1].value) || 0;
    if (desc && price > 0) {
      items.push({ description: desc, quantity: qty, unit, unit_price: price });
      total += qty * price;
    }
  });
  if (items.length === 0) { showToast('กรุณากรอกรายการและราคา'); return; }

  const btn = document.getElementById('btn-save-edit');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';

  const onSuccess = function(res) {
    btn.disabled = false; btn.textContent = 'บันทึกการแก้ไข';
    if (res && res.success) {
      showToast('✅ แก้ไขสำเร็จ');
      closeModalDirect();
      loadHistory();
      loadDashboard();
    } else {
      showToast('❌ แก้ไขไม่สำเร็จ');
    }
  };
  const onFail = function() {
    btn.disabled = false; btn.textContent = 'บันทึกการแก้ไข';
    showToast('❌ เกิดข้อผิดพลาด');
  };

  if (m.type === 'income') {
    google.script.run
      .withSuccessHandler(onSuccess).withFailureHandler(onFail)
      .updateIncome({ id: m.id, data: { date, total, items } });
  } else {
    google.script.run
      .withSuccessHandler(onSuccess).withFailureHandler(onFail)
      .updateExpense({ id: m.id, data: { date, note, total, items } });
  }
}

  posRenderCategories();

// --- แสดง Step ---
function posShowStep(step) {
  const hdrMap = {category:'cat', list:'list', menu:'menu', cart:'cart', pay:'pay', 'session-order':'session'};
  ['category','list','menu','cart','pay','session-order'].forEach(s => {
    document.getElementById('pos-step-' + s).style.display = 'none';
    document.getElementById('pos-header-' + hdrMap[s]).style.display = 'none';
  });
  document.getElementById('pos-step-' + step).style.display =
    (step === 'cart' || step === 'session-order') ? 'flex' : 'block';
  document.getElementById('pos-header-' + hdrMap[step]).style.display = 'flex';
}

  // ใหม่ (เพิ่ม posSetPct ตรงนี้ไม่ต้องการ เพราะ loadMenuItemsForPOS จัดการแล้ว)
  if (menuCategories.length === 0) {
    google.script.run
      .withSuccessHandler(function(res) {
        menuCategories = Array.isArray(res) ? res : (res.data || []);
        posRenderCategories();

        document.getElementById('pos-cat-grid').innerHTML =
          '<div class="empty">โหลดประเภทเมนูไม่สำเร็จ</div>';
      })

        onclick="posSelectCategory('${cat.name}')">

function posRenderListContent() {
  const searchVal = (document.getElementById('pos-list-search').value || '').trim().toLowerCase();
  const container = document.getElementById('pos-list-content');

  let items = allMenuItems.filter(m => m.is_active !== false);
  if (posListCatFilter) {
    items = items.filter(m =>
      (m.menu_categories ? m.menu_categories.name : '') === posListCatFilter
    );
  }
  if (searchVal) {
    items = items.filter(m => m.name.toLowerCase().includes(searchVal));
  }

  if (items.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#999;padding:40px 0;font-size:14px;">ไม่พบเมนู</div>';
    return;
  }

  const grouped = {};
  items.forEach(m => {
    const cat = m.menu_categories ? m.menu_categories.name : 'อื่นๆ';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(m);
  });

  let html = '';
  Object.keys(grouped).sort((a, b) => a.localeCompare(b, 'th')).forEach(catName => {
    const icon = getCategoryIcon(catName);
    html += `<div class="pos-list-section-title"><span>${icon}</span> ${catName}</div>`;
    grouped[catName].sort((a, b) => a.name.localeCompare(b.name, 'th')).forEach(item => {
      const badges = openTables.map((t, i) => {
        const ci = (carts[t] || []).find(c => c.id === item.id);
        return ci
          ? `<div class="pos-list-badge" style="background:${TABLE_COLORS[i % TABLE_COLORS.length]}">${t} x${ci.qty}</div>`
          : '';
      }).join('');

      const thumb = item.image_url
        ? `<img src="${item.image_url}">`
        : icon;

      html += `
        <div class="pos-list-row" data-menu-id="${item.id}" onclick="posOpenPopup(${item.id})">
          <div class="pos-list-thumb">${thumb}</div>
          <div class="pos-list-info">
            <div class="pos-list-name">${item.name}</div>
            <div class="pos-list-price">฿${parseFloat(item.price).toLocaleString()}</div>
          </div>
          ${badges}
          <button class="pos-list-add"
            onclick="event.stopPropagation();posOpenPopup(${item.id})">+</button>
        </div>`;
    });
  });
  container.innerHTML = html;
}

// ---- POPUP ----
function posOpenPopup(itemId) {
  const item = allMenuItems.find(m => m.id === itemId);
  if (!item) return;
  posCurrentItem = item;
  posCurrentQty  = 1;

  // บังคับเปิดโต๊ะก่อนสั่ง
  if (openTables.length === 0) {
    posShowOpenTableModal(itemId);
    return;
  }
  if (!activeTable || !openTables.includes(activeTable)) {
    if (openTables.length > 0) activeTable = openTables[0];
    else return;
  }
  posCurrentTable = activeTable;

  const imgEl = document.getElementById('pos-popup-img');
  imgEl.innerHTML = '';
  if (item.image_url) {
    const _pimg = document.createElement('img');
    _pimg.src = item.image_url;
    _pimg.style.cssText = 'width:100%;height:100%;object-fit:cover;';
    imgEl.appendChild(_pimg);
  } else {
    imgEl.textContent = '🍽';
  }
  document.getElementById('pos-popup-name').textContent  = item.name;
  document.getElementById('pos-popup-price').textContent =
    '฿' + parseFloat(item.price).toLocaleString() + ' / จาน';
  document.getElementById('pos-qty-num').textContent     = 1;
  document.getElementById('pos-popup-subtotal').textContent =
    '฿' + parseFloat(item.price).toLocaleString();

  posRenderTableSelector();
  posUpdateAddCartBtn();
  document.getElementById('pos-popup').classList.add('show');
}

function posRenderTableSelector() {
  const wrap = document.getElementById('pos-table-selector');
  wrap.innerHTML = openTables.map((t, i) => {
    const col    = TABLE_COLORS[i % TABLE_COLORS.length];
    const isActive = t === posCurrentTable;
    return `
      <div class="pos-tsel ${isActive ? 'active' : ''}"
        style="${isActive

}


function posQtyChange(delta) {
  posCurrentQty = Math.max(1, posCurrentQty + delta);
  document.getElementById('pos-qty-num').textContent = posCurrentQty;
  const sub = posCurrentQty * parseFloat(posCurrentItem.price);

}

  document.getElementById('pos-popup').classList.remove('show');

// ---- ADD TO CART ----
function posAddToCart() {
  const t    = posCurrentTable;
  const item = posCurrentItem;
  const qty  = posCurrentQty;
  if (!item || !t) return;

  // Dedup: ป้องกันกด add ซ้ำเร็วเกิน 300ms
  const _now = Date.now();
  const _recent = localSessionItems.find(i =>
    i._pending && i.menu_item_id === item.id &&
    (_now - (i._addedAt || 0)) < 300
  );
  if (_recent) { showToast('⚠️ กำลังเพิ่มอยู่...'); return; }

  if (currentSessionId) {
    // Optimistic UI — บันทึกใน memory ก่อน แสดงผลทันที แล้วค่อย sync background
    const tempId = '__temp_' + (++_tempIdCounter);
    localSessionItems.push({
      _tempId:      tempId,
      _pending:     true,
      _addedAt:     Date.now(),
      session_id:   currentSessionId,
      menu_item_id: item.id,
      menu_name:    item.name,
      price:        parseFloat(item.price),
      qty:          qty,
      note:         '',
      status:       'pending'
    });
    pendingQueue.push({
      _tempId:      tempId,
      session_id:   currentSessionId,
      menu_item_id: item.id,
      menu_name:    item.name,
      price:        parseFloat(item.price),
      qty:          qty,
      note:         ''
    });
    showToast('✅ ' + item.name + ' ×' + qty);
    closePosPopup();
    renderSessionOrderMerged();
    schedulePendingSync();
    return;
  }

  // Local cart mode
  if (!carts[t]) carts[t] = [];
  const existing = carts[t].find(c => c.id === item.id);
  if (existing) existing.qty += qty;
  else carts[t].push({ id: item.id, name: item.name,
    price: parseFloat(item.price), qty });

  activeTable = t;
  closePosPopup();
  posUpdateCartBadge();
  if (posViewMode === 'list') {
    posRenderListContent();
    posRenderListTableBar();
  } else {
    posRenderMenuGrid(document.getElementById('pos-menu-title').textContent);
    posRenderTableBar();
  }
  showToast('✅ ' + item.name + ' ×' + qty + ' → ' + t);
}

            style="background:${TABLE_COLORS[i % TABLE_COLORS.length]}">

     <div class="pos-menu-card" data-menu-id="${item.id}" onclick="posOpenPopup(${item.id})">

          onclick="event.stopPropagation();posOpenPopup(${item.id})">+</button>

  }).join('');
  refreshVisibleImages();
}

  // หาค่าที่ใกล้เคียง

    </div>

function posSelectBill(amount) {
  document.getElementById('pay-received').value = amount;
  // highlight
  document.querySelectorAll('.bill-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.closest('.bill-btn')?.classList.add('active');
  calcChange();
}

function calcChange() {
  const totalText = (document.getElementById('pay-total-display').textContent || '').replace(/[฿,\s]/g, '');
  const total = parseFloat(totalText) || 0;
  if (!total) return;
  const received = parseFloat(document.getElementById('pay-received').value) || 0;
  const change   = received - total;
  const box      = document.getElementById('change-box');

  if (received > 0) {
    box.style.display = 'flex';
    document.getElementById('change-display').textContent =
      (change >= 0 ? '฿' : '-฿') +
      Math.abs(change).toLocaleString('th', {minimumFractionDigits:2});
    box.style.background = change >= 0 ? '#FAECE7' : '#fff0f0';
    document.getElementById('change-display').style.color =
      change >= 0 ? '#993C1D' : '#e74c3c';
  } else {
    box.style.display = 'none';
  }

  const btn = document.getElementById('pos-btn-confirm');
  if (btn) {
    btn.disabled = received < total;
    btn.textContent = received >= total
      ? '✓ ยืนยันรับชำระ ฿' + received.toLocaleString()
      : '✓ ยืนยันรับชำระ';
  }
}

function getAnalyticsDates(period) {
  const now   = new Date();
  const today = now.toISOString().split('T')[0];
  let from    = today;

  if (period === 'week') {
    const d = new Date(now);
    d.setDate(d.getDate() - 6);
    from = d.toISOString().split('T')[0];
  } else if (period === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1)
      .toISOString().split('T')[0];
  } else if (period === '3month') {
    const d = new Date(now);
    d.setMonth(d.getMonth() - 2);
    from = new Date(d.getFullYear(), d.getMonth(), 1)
      .toISOString().split('T')[0];
  } else if (period === 'custom') {
    return {
      from: analyticsCustomFrom || today,
      to:   analyticsCustomTo   || today
    };
  }
  return { from, to: today };
}

function setAnalyticsPeriod(period, el) {
  analyticsPeriod = period;
  ingrDataCache   = [];
  ingrViewMode    = 'count';

  // clear cache เมื่อเปลี่ยน period
  analyticsCache.loaded = false;

  // reset toggle UI
  const toggleWrap = document.getElementById('an-ingr-toggle');
  if (toggleWrap) {
    toggleWrap.querySelectorAll('.an-toggle-btn')
      .forEach(b => b.classList.remove('active'));
    const firstBtn = toggleWrap.querySelector('.an-toggle-btn');
    if (firstBtn) firstBtn.classList.add('active');
  }

  document.querySelectorAll('#page-analytics .chip')
    .forEach(c => c.classList.remove('active'));
  el.classList.add('active');

  // แสดง/ซ่อน date picker สำหรับ custom
  const customRow = document.getElementById('an-custom-date-row');
  if (customRow) customRow.style.display = period === 'custom' ? 'block' : 'none';

  if (period === 'custom') {
    document.getElementById('analytics-period-label').textContent = 'กำหนดช่วงเวลา';
    return; // รอให้กด "ดูรายงาน"
  }

  const labels = {
    today:'วันนี้', week:'สัปดาห์นี้',
    month:'เดือนนี้', '3month':'3 เดือนที่ผ่านมา'
  };
  document.getElementById('analytics-period-label').textContent =
    labels[period];

  loadAnalyticsData();
}

function applyCustomDateRange() {
  const from = document.getElementById('an-date-from').value;
  const to   = document.getElementById('an-date-to').value;
  if (!from || !to) {
    showToast('กรุณาเลือกวันเริ่มต้นและวันสิ้นสุด');
    return;
  }
  if (from > to) {
    showToast('วันเริ่มต้นต้องไม่เกินวันสิ้นสุด');
    return;
  }
  analyticsCustomFrom = from;
  analyticsCustomTo   = to;

  const fmt = function(d) {
    const parts = d.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0].slice(2);
  };
  document.getElementById('analytics-period-label').textContent =
    fmt(from) + ' – ' + fmt(to);

  analyticsCache = { loaded: false, period: '', menuItems: [], salesData: [], stockData: [] };
  ingrDataCache  = [];
  loadAnalyticsData();
}

function switchAnalyticsTab(tab) {
  analyticsTab = tab;
  [1,2,3,4].forEach(t => {
    document.getElementById('an-tab-' + t).classList.remove('active');
    document.getElementById('an-panel-' + t).style.display = 'none';
  });
  document.getElementById('an-tab-' + tab).classList.add('active');
  document.getElementById('an-panel-' + tab).style.display = 'block';

  
  if (tab === 4) {
    loadStockData();
  }
}
function loadAnalyticsData() {
  const { from, to } = getAnalyticsDates(analyticsPeriod);

  // ถ้ามี cache และ period เดิม → ใช้ cache ทันที
  if (analyticsCache.loaded && analyticsCache.period === analyticsPeriod) {
    analyticsData = analyticsCache.salesData;
    stockData     = analyticsCache.stockData;
    renderAllAnalytics();
    return;
  }

  // เริ่มโหลดใหม่
  analyticsLoadCount = 0;
  showAnalyticsLoading(true);
  updateLoadStatus('menu',  'loading');
  updateLoadStatus('sales', 'loading');
  updateLoadStatus('stock', 'loading');

  // 1) โหลด Menu Items
  google.script.run
    .withSuccessHandler(function(res) {
      analyticsCache.menuItems = Array.isArray(res) ? res : (res.data || []);
      updateLoadStatus('menu', 'done');
      onAnalyticsPartLoaded();
    })
    .withFailureHandler(function() {
      updateLoadStatus('menu', 'error');
      onAnalyticsPartLoaded();
    })
    .getMenuItems();

  // 2) โหลด Sales Report
  google.script.run
    .withSuccessHandler(function(res) {
      analyticsData = (res && res.success) ? res.data : [];
      analyticsCache.salesData = analyticsData;
      updateLoadStatus('sales', 'done');
      onAnalyticsPartLoaded();
    })
    .withFailureHandler(function() {
      updateLoadStatus('sales', 'error');
      onAnalyticsPartLoaded();
    })
    .getSalesReport({ dateFrom: from, dateTo: to });

  // 3) โหลด Stock
  const now    = new Date();
  const today  = now.toISOString().split('T')[0];
  const d30    = new Date(now);
  d30.setDate(d30.getDate() - 30);
  const from30 = d30.toISOString().split('T')[0];

  google.script.run
    .withSuccessHandler(function(res) {
      stockData = (res && res.success) ? res.data : [];
      analyticsCache.stockData = stockData;
      updateLoadStatus('stock', 'done');
      onAnalyticsPartLoaded();
    })
    .withFailureHandler(function() {
      updateLoadStatus('stock', 'error');
      onAnalyticsPartLoaded();
    })
    .getIngredientStock({ dateFrom: from30, dateTo: today });
}

function onAnalyticsPartLoaded() {
  analyticsLoadCount++;
  // อัปเดต progress bar
  const pct = Math.round((analyticsLoadCount / 3) * 100);
  document.getElementById('analytics-loading-pct').textContent = pct + '%';
  document.getElementById('analytics-loading-fill').style.width = pct + '%';

  // ครบ 3 อัน → render ทุก tab
  if (analyticsLoadCount >= 3) {
    setTimeout(function() {
          analyticsCache.loaded    = true;
          analyticsCache.period    = analyticsPeriod;
          analyticsCache.salesData = analyticsData;
          analyticsCache.stockData = stockData;
          showAnalyticsLoading(false);
          renderAllAnalytics();
    }, 50);
  }
}

function renderAllAnalytics() {
  renderAnalyticsMetrics();
  renderMenuRanking();
  renderIngredientUsage();
  renderOverview();
  renderStockList();
  if (analyticsTab  === 4) {
    // ใช้ stockData ที่โหลดไว้แล้ว render ทันที
    if (stockData.length > 0) {
      renderStockList();
    } else if (!analyticsCache.loaded) {
      document.getElementById('an-stock-list').innerHTML =
        '<div class="loading">กำลังโหลด...</div>';
    } else {
      document.getElementById('an-stock-list').innerHTML =
        '<div class="empty">ไม่พบข้อมูลคลัง</div>';
    }
  }
}

function showAnalyticsLoading(show) {
  document.getElementById('analytics-loading-bar').style.display =
    show ? 'block' : 'none';
  document.getElementById('btn-analytics-refresh').style.opacity =
    show ? '0.5' : '1';
  document.getElementById('btn-analytics-refresh').disabled = show;
}

function updateLoadStatus(key, status) {
  const el = document.getElementById('al-' + key + '-status');
  if (!el) return;
  const icons = { menu:'🍽', sales:'📊', stock:'📦' };
  const labels = { menu:'เมนู', sales:'ยอดขาย', stock:'คลัง' };
  const icon = icons[key];
  const label = labels[key];

  if (status === 'loading') {
    el.style.background = '#E6F1FB';
    el.style.color      = '#185FA5';
    el.innerHTML        = icon + ' ' + label + ' ⏳';
  } else if (status === 'done') {
    el.style.background = '#E1F5EE';
    el.style.color      = '#085041';
    el.innerHTML        = icon + ' ' + label + ' ✓';
  } else if (status === 'error') {
    el.style.background = '#FAECE7';
    el.style.color      = '#712B13';
    el.innerHTML        = icon + ' ' + label + ' ✕';
  }
}

function refreshAnalytics() {
  // clear cache → โหลดใหม่
  analyticsCache = {
    loaded: false, period: '',
    menuItems: [], salesData: [], stockData: []
  };
  analyticsLoadCount = 0;

  // reset progress
  document.getElementById('analytics-loading-pct').textContent = '0%';
  document.getElementById('analytics-loading-fill').style.width = '0%';
  updateLoadStatus('menu',  'loading');
  updateLoadStatus('sales', 'loading');
  updateLoadStatus('stock', 'loading');

  loadAnalyticsData();
}
function doLoadAnalytics(from, to) {
  google.script.run
    .withSuccessHandler(function(res) {
      analyticsData = (res && res.success) ? res.data : [];
      renderAnalyticsMetrics();
      renderMenuRanking();
      renderIngredientUsage();
      renderOverview();
    })
    .withFailureHandler(function() {
      document.getElementById('an-menu-list').innerHTML =
        '<div class="empty">โหลดไม่สำเร็จ</div>';
    })
    .getSalesReport({ dateFrom: from, dateTo: to });
}

function renderAnalyticsMetrics() {

// ---- TAB 1: MENU RANKING ----
function renderMenuRanking() {
  // รวมยอดต่อเมนู
  const menuMap = {};
  analyticsData.forEach(item => {
    const name = item.description;
    const qty  = parseFloat(item.quantity) || 0;
    const rev  = qty * (parseFloat(item.unit_price) || 0);
    if (!menuMap[name]) menuMap[name] = { name, qty: 0, revenue: 0 };
    menuMap[name].qty     += qty;
    menuMap[name].revenue += rev;
  });

  const sorted = Object.values(menuMap)
    .sort((a,b) => b.qty - a.qty)
    .slice(0, 10);

  if (sorted.length === 0) {
    document.getElementById('an-menu-list').innerHTML =
      '<div class="empty">ไม่มีข้อมูลในช่วงนี้</div>';
    return;
  }

  const maxQty = sorted[0].qty;
  document.getElementById('an-menu-list').innerHTML =
    sorted.map((m, i) => {
      const pct  = Math.round((m.qty / maxQty) * 100);
      const rc   = RANK_COLORS[i] || { bg:'#f0f0f0', text:'#666' };
      const barC = AN_COLORS[i % AN_COLORS.length];
      return `
        <div class="an-rank-item">
          <div class="an-rank-num"
            style="background:${rc.bg};color:${rc.text};">${i+1}</div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;color:#222;">${m.name}</div>
            <div style="font-size:11px;color:#999;margin-top:1px;">
              ฿${m.revenue.toLocaleString('th',{minimumFractionDigits:0})} รายรับ
            </div>
          </div>
          <div class="an-bar-bg">
            <div class="an-bar" style="width:${pct}%;background:${barC};"></div>
          </div>
          <div style="font-size:13px;font-weight:500;color:${barC};
            min-width:36px;text-align:right;">${m.qty}</div>
        </div>`;
    }).join('');
}
function renderIngredientUsage() {
  const el = document.getElementById('an-ingr-list');

  if (allMenuItems.length === 0) {
    el.innerHTML = '<div class="empty">ไม่มีข้อมูลเมนู</div>';
    return;
  }

  // รวมยอดขายต่อเมนู
  const menuSales = {};
  analyticsData.forEach(item => {
    const name = item.description;
    menuSales[name] = (menuSales[name] || 0) + parseFloat(item.quantity || 0);
  });

  // คำนวณวัตถุดิบจาก BOM × ยอดขาย
  const ingrMap = {};
  allMenuItems.forEach(menu => {
    const sold  = menuSales[menu.name] || 0;
    if (sold === 0) return;
    const ingrs = Array.isArray(menu.menu_ingredients)
      ? menu.menu_ingredients : [];
    ingrs.forEach(ing => {
      if (!ing) return;
      const name = (ing.ingredients && ing.ingredients.name)
        ? ing.ingredients.name
        : ('วัตถุดิบ-' + (ing.ingredient_id || '?'));
      const qty  = (parseFloat(ing.quantity) || 0) * sold;
      const unit = ing.unit || 'G';
      if (!ingrMap[name]) {
        ingrMap[name] = { name, totalQty: 0, unit, menus: [] };
      }
      ingrMap[name].totalQty += qty;
      ingrMap[name].menus.push({
        menuName: menu.name,
        sold:     sold,
        qtyPer:   parseFloat(ing.quantity) || 0,
        total:    qty,
        unit:     unit
      });
    });
  });

  ingrDataCache = Object.values(ingrMap)
    .sort((a, b) => b.totalQty - a.totalQty);

  if (ingrDataCache.length === 0) {
    el.innerHTML = `
      <div class="empty">
        ไม่พบข้อมูลวัตถุดิบ<br>
        <small style="color:#ccc;">กรุณาเพิ่มวัตถุดิบในหน้าเมนู</small>
      </div>`;
    return;
  }

  // render toggle bar
  document.getElementById('an-ingr-toggle').style.display = 'flex';
  renderIngrByMode();
}
