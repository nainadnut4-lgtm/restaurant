// ---- COUNT MODE ----
function renderIngrCount() {
  const el = document.getElementById('an-ingr-list');
  if (!ingrDataCache || ingrDataCache.length === 0) {
    el.innerHTML = '<div class="empty">ไม่มีข้อมูล</div>';
    return;
  }

  const stockMap = {};
  (stockData || []).forEach(s => {
    stockMap[s.name] = { bought: s.totalQty, unit: s.unit, times: (s.purchases || []).length };
  });

  const RANK_C = [
    { bg:'#FFD700', text:'#7a5c00' },
    { bg:'#C0C0C0', text:'#444' },
    { bg:'#CD7F32', text:'#fff' }
  ];

  // คำนวณ status ทุกตัวก่อน เพื่อนับ banner
  const computed = ingrDataCache.map((ingr, i) => {
    const usedQty   = ingr.totalQty;
    const stock     = stockMap[ingr.name];
    const boughtQty = stock ? convertUnit(stock.bought, stock.unit, ingr.unit) : null;
    const remain    = boughtQty !== null ? boughtQty - usedQty : null;
    const remainPct = boughtQty > 0 ? Math.max(0, (remain / boughtQty) * 100) : null;
    const buyTimes  = stock ? stock.times : null;
    const status    = remain === null   ? 'nodata'
      : remain <= 0                     ? 'out'
      : remainPct < 5                   ? 'danger'
      : remainPct < 30                  ? 'low' : 'ok';
    return { ingr, i, usedQty, boughtQty, remain, remainPct, buyTimes, status };
  });

  // เรียง: out → danger → low → ok → nodata
  const order = { out:0, danger:1, low:2, ok:3, nodata:4 };
  computed.sort((a, b) => order[a.status] - order[b.status]);

  // banner จำนวนที่ต้องซื้อ
  const needBuy = computed.filter(c => c.status === 'out' || c.status === 'danger' || c.status === 'low').length;
  const bannerHtml = needBuy > 0 ? `
    <div style="background:#FFF3E0;border:1px solid #FFB74D;border-radius:10px;
      padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:15px;">🛒</span>
      <span style="font-size:12px;color:#E65100;font-weight:500;flex:1;">ต้องซื้อเพิ่ม</span>
      <span style="background:#E65100;color:#fff;border-radius:20px;
        padding:2px 10px;font-size:11px;font-weight:500;">${needBuy} รายการ</span>
    </div>` : '';

  const cards = computed.map(({ ingr, i, usedQty, boughtQty, remain, remainPct, buyTimes, status }) => {
    const rc = RANK_C[i] || { bg:'#f0f0f0', text:'#666' };

    // สีตาม status
    const palette = {
      ok:     { bar:'#1D9E75', border:'#eee',    bg:'#fff',    badge:'background:#E8F5E9;color:#2E7D32;', label:'✓ พอ' },
      low:    { bar:'#FFB74D', border:'#FFB74D',  bg:'#FFFDE7', badge:'background:#FFF3E0;color:#E65100;', label:'⚡ ใกล้หมด' },
      danger: { bar:'#EF5350', border:'#EF5350',  bg:'#FFF5F5', badge:'background:#FFEBEE;color:#B71C1C;', label:'🔴 วิกฤต' },
      out:    { bar:'#EF5350', border:'#EF5350',  bg:'#FFF5F5', badge:'background:#FFEBEE;color:#B71C1C;', label:'✕ ต้องซื้อด่วน' },
      nodata: { bar:'#ccc',    border:'#eee',    bg:'#fff',    badge:'background:#f5f5f5;color:#999;',    label:'' }
    };
    const p = palette[status];

    // แถบ: usedPct = ส่วนใช้, remainPct_ = ส่วนเหลือ
    let usedBarW = 0, remainBarW = 0, markerLeft = 0;
    if (boughtQty > 0) {
      usedBarW   = Math.min(100, Math.round((usedQty   / boughtQty) * 100));
      remainBarW = Math.max(0,   100 - usedBarW);
      markerLeft = usedBarW;
    } else if (boughtQty === null) {
      usedBarW = 100; remainBarW = 0;
    }

    const remainText = remain !== null
      ? `<span style="font-size:12px;font-weight:500;color:${
          status === 'ok' ? '#1D9E75' : status === 'low' ? '#E65100' : '#EF5350'
        };">${remain < 0 ? '−' : ''}${Math.abs(Math.round(remain * 10) / 10)} ${ingr.unit}</span>`
      : `<span style="font-size:11px;color:#bbb;">ไม่มีข้อมูลซื้อ</span>`;

    const timesChip = buyTimes !== null
      ? `<span style="background:#EEEDFE;color:#534AB7;border-radius:20px;
           padding:1px 7px;font-size:10px;font-weight:500;">ซื้อ ${buyTimes} ครั้ง</span>`
      : '';

    const badgeHtml = p.label
      ? `<span style="${p.badge}border-radius:20px;padding:2px 8px;font-size:10px;font-weight:500;">
           ${p.label}</span>` : '';

    return `
      <div style="background:${p.bg};border-radius:12px;padding:10px 12px;
        border:1.5px solid ${p.border};margin-bottom:0;">

        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
          <div style="width:22px;height:22px;border-radius:50%;background:${rc.bg};
            color:${rc.text};display:flex;align-items:center;justify-content:center;
            font-size:10px;font-weight:500;flex-shrink:0;">${i + 1}</div>
          <span style="flex:1;font-size:13px;font-weight:500;color:#222;">${ingr.name}</span>
          <div style="display:flex;align-items:center;gap:5px;">
            ${timesChip}
            ${badgeHtml}
            <span style="font-size:13px;font-weight:500;color:${p.bar};">
              ${usedQty.toLocaleString('th', {minimumFractionDigits:1})} ${ingr.unit}
            </span>
          </div>
        </div>

        <div style="position:relative;height:7px;background:#f0f0f0;
          border-radius:4px;overflow:hidden;margin-bottom:6px;">
          <div style="position:absolute;left:0;top:0;height:100%;width:${usedBarW}%;
            background:${p.bar};border-radius:${remainBarW > 0 ? '4px 0 0 4px' : '4px'};"></div>
          ${remainBarW > 0 ? `
          <div style="position:absolute;left:${markerLeft}%;top:0;height:100%;width:${remainBarW}%;
            background:${p.bar};opacity:0.25;border-radius:0 4px 4px 0;"></div>
          <div style="position:absolute;left:${markerLeft}%;top:-1px;width:2px;height:9px;
            background:#555;border-radius:1px;"></div>` : ''}
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:11px;color:#999;">
            ซื้อมา: ${boughtQty !== null
              ? (Math.round(boughtQty * 10) / 10) + ' ' + ingr.unit : '—'}
          </span>
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="font-size:11px;color:#999;">คงเหลือ:</span>
            ${remainText}
          </div>
        </div>

      </div>`;
  }).join('');

  el.innerHTML = bannerHtml + `<div style="display:flex;flex-direction:column;gap:7px;">${cards}</div>`;
}

// ---- TAB 3: OVERVIEW ----
function renderOverview() {
  const totalRev = analyticsData.reduce((s,i) =>
    s + parseFloat(i.quantity||0) * parseFloat(i.unit_price||0), 0);

  // คำนวณต้นทุนจาก menu_items.price (ใช้ประมาณการ 40% ของราคาขาย)
  // TODO: เมื่อมี ingredient price จะคำนวณจริง
  const totalCost   = totalRev * 0.4;
  const totalProfit = totalRev - totalCost;

  document.getElementById('an-rev').textContent =
    '฿' + totalRev.toLocaleString('th',{minimumFractionDigits:0});
  document.getElementById('an-cost').textContent =
    '฿' + totalCost.toLocaleString('th',{minimumFractionDigits:0});
  document.getElementById('an-profit').textContent =
    '฿' + totalProfit.toLocaleString('th',{minimumFractionDigits:0});

  // Category breakdown
  const catMap = {};
  analyticsData.forEach(item => {
    const menu = allMenuItems.find(m => m.name === item.description);
    const cat  = menu && menu.menu_categories
      ? menu.menu_categories.name : 'อื่นๆ';
    const rev  = parseFloat(item.quantity||0) * parseFloat(item.unit_price||0);
    if (!catMap[cat]) catMap[cat] = 0;
    catMap[cat] += rev;
  });

  const catSorted = Object.entries(catMap)
    .sort((a,b) => b[1] - a[1]);

  document.getElementById('an-cat-list').innerHTML =

          </div>
        </div>`;

  // Margin per menu
  const menuMargin = {};
  analyticsData.forEach(item => {
    const menu  = allMenuItems.find(m => m.name === item.description);
    const price = parseFloat(item.unit_price || 0);
    // ประมาณต้นทุน 40%
    const margin = price > 0 ? Math.round(((price - price*0.4)/price)*100) : 0;
    if (!menuMargin[item.description])
      menuMargin[item.description] = { margin, revenue:0 };
    menuMargin[item.description].revenue +=
      parseFloat(item.quantity||0) * price;
  });

  const marginSorted = Object.entries(menuMargin)
    .sort((a,b) => b[1].margin - a[1].margin)
    .slice(0,5);

  document.getElementById('an-margin-list').innerHTML =
    marginSorted.map(([name, v]) => {

      return `
        <div class="an-margin-item">

            <div style="font-size:11px;color:#999;margin-top:1px;">

            </div>
          </div>
          <div style="font-size:14px;font-weight:500;color:${col};">
            ${v.margin}%
          </div>
        </div>`;
    }).join('');
}

function renderStockList() {
  const el = document.getElementById('an-stock-list');

  if (stockData.length === 0) {
    el.innerHTML = '<div class="empty">ไม่พบข้อมูลการซื้อวัตถุดิบ</div>';
    return;
  }

  // คำนวณ usage จาก ingrDataCache
  const usageMap = {};
  ingrDataCache.forEach(ingr => {
    usageMap[ingr.name] = { qty: ingr.totalQty, unit: ingr.unit };
  });

  // สร้าง stock items
  const items = stockData.map(s => {
    const usage    = usageMap[s.name];
    const usedQty  = usage ? convertUnit(usage.qty, usage.unit, s.unit) : 0;
    const remain   = s.totalQty - usedQty;
    const pct      = s.totalQty > 0
      ? Math.max(0, Math.round((remain / s.totalQty) * 100)) : 0;
    const status   = remain < 0    ? 'out'
      : pct < 30                   ? 'low' : 'ok';
    return { ...s, usedQty, remain, pct, status };
  });

  // แจ้งเตือน
  const alerts = items.filter(i => i.status !== 'ok');
  const alertEl = document.getElementById('an-stock-alert');
  if (alerts.length > 0) {
    alertEl.style.display = 'block';
    alertEl.innerHTML = '⚠️ ' +
      alerts.map(i =>
        `<strong>${i.name}</strong> ${i.status === 'out' ? 'หมดแล้ว' : 'ใกล้หมด'}`
      ).join(' · ');
  } else {
    alertEl.style.display = 'none';
  }

  // เรียงตาม status: out → low → ok
  items.sort((a,b) => {
    const order = { out:0, low:1, ok:2 };
    return order[a.status] - order[b.status];
  });

  el.innerHTML = items.map(item => {
    const barColor = item.status === 'ok'  ? '#1D9E75'
      : item.status === 'low' ? '#E2A917' : '#D85A30';
    const statusLabel = item.status === 'ok'
      ? '✓ พอ' : item.status === 'low'
      ? '⚡ ใกล้หมด' : '✕ หมดแล้ว';
    const statusClass = 's-' + item.status;
    const remainText  = item.remain >= 0
      ? item.remain.toLocaleString('th',{minimumFractionDigits:1})
      : item.remain.toLocaleString('th',{minimumFractionDigits:1});
    const lastBuy = item.purchases.length > 0
      ? item.purchases[item.purchases.length-1] : null;

    return `
      <div class="stock-card">
        <div class="stock-head">
          <div class="stock-name">${item.name}</div>
          <div class="stock-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="stock-bar-wrap">
          <div class="stock-bar-bg">
            <div class="stock-bar-fill"
              style="width:${item.pct}%;background:${barColor};"></div>
          </div>
        </div>
        <div class="stock-nums">
          <span>ซื้อมา ${item.totalQty.toLocaleString('th',
            {minimumFractionDigits:1})} ${item.unit}</span>
          <span style="color:#D85A30;">
            ใช้ไป ${item.usedQty.toLocaleString('th',
              {minimumFractionDigits:1})} ${item.unit}
          </span>
          <span style="color:${barColor};font-weight:500;">
            เหลือ ${remainText} ${item.unit}
          </span>
        </div>
        <div class="stock-detail">
          ${lastBuy ? `
            <div class="stock-detail-row">
              <span style="color:#999;">🛒 ซื้อล่าสุด ${lastBuy.date}</span>
              <span class="sd-plus">
                +${lastBuy.qty.toLocaleString('th',
                  {minimumFractionDigits:1})} ${lastBuy.unit}
              </span>
            </div>` : ''}
          ${item.usedQty > 0 ? `
            <div class="stock-detail-row">
              <span style="color:#999;">🍽 ใช้ในช่วงนี้</span>
              <span class="sd-minus">
                −${item.usedQty.toLocaleString('th',
                  {minimumFractionDigits:1})} ${item.unit}
              </span>
            </div>` : `
            <div class="stock-detail-row">
              <span style="color:#bbb;font-size:11px;">
                ยังไม่มีการใช้ในช่วงนี้
              </span>
            </div>`}
        </div>
      </div>`;
  }).join('');
}

// แปลงหน่วย G↔KG
function convertUnit(qty, fromUnit, toUnit) {
  if (fromUnit === toUnit) return qty;
  if (fromUnit === 'G'  && toUnit === 'KG') return qty / 1000;
  if (fromUnit === 'KG' && toUnit === 'G')  return qty * 1000;
  if (fromUnit === 'ML' && toUnit === 'L')  return qty / 1000;
  if (fromUnit === 'L'  && toUnit === 'ML') return qty * 1000;
  // หน่วยอื่นๆ ยังไม่ convert — return qty ตรงๆ
  return qty;
}

 // Status helper

function openTableSession(sessionId, tableName) {
  console.log('[openTableSession] ▶ เริ่ม | sessionId:', sessionId, '| tableName:', tableName);
  console.log('[openTableSession] currentSessionId ก่อนเปลี่ยน:', currentSessionId);

  if (currentSessionId && currentSessionId !== sessionId) {
    console.log('[openTableSession] เปลี่ยน session', currentSessionId, '→', sessionId);
    if (pendingQueue.length > 0 && !_syncInProgress) {
      console.log('[openTableSession] flush pendingQueue:', pendingQueue.length, 'รายการ');
      clearTimeout(_syncTimer);
      _syncTimer = null;
      runPendingSync();
    } else {
      console.log('[openTableSession] pendingQueue ว่าง หรือ sync กำลังวิ่งอยู่ — ไม่ flush');
    }
    localSessionItems = [];
    hideSyncBar();
  }

  currentSessionId   = sessionId;
  currentSessionName = tableName;

  if (!openTables.includes(tableName)) {
    console.log('[openTableSession] tableName ไม่อยู่ใน openTables — push เพิ่ม');
    openTables.push(tableName);
    carts[tableName] = carts[tableName] || [];
  }
  activeTable = tableName;
  console.log('[openTableSession] activeTable:', activeTable, '| openTables:', JSON.stringify(openTables));

  const cached = tableSessionCache.find(s => s.id === sessionId);
  console.log('[openTableSession] cache:', cached ? 'พบ (' + (cached.items||[]).length + ' items) — render ทันที' : 'ไม่พบ — รอโหลดจาก server');
  if (cached) renderSessionOrder(cached);

  console.log('[openTableSession] 🚀 ส่ง getOpenSessions → server เพื่อ refresh');
  google.script.run
    .withSuccessHandler(function(res) {
      console.log('[openTableSession] 📩 getOpenSessions ตอบกลับ | success:', res && res.success, '| sessions:', (res && res.data) ? res.data.length : 0);
      if (!res || !res.success) {
        console.log('[openTableSession] ❌ getOpenSessions ล้มเหลว');
        return;
      }
      const session = res.data.find(s => s.id === sessionId);
      if (session) {
        console.log('[openTableSession] ✅ พบ session id:', sessionId, '| items:', (session.items||[]).length, '— render');
        const ci = tableSessionCache.findIndex(s => s.id === sessionId);
        if (ci >= 0) tableSessionCache[ci] = session;
        else tableSessionCache.push(session);
        renderSessionOrder(session);
      } else {
        console.log('[openTableSession] ⚠️ ไม่พบ session id:', sessionId, 'ใน response');
      }
    })
    .getOpenSessions();

  console.log('[openTableSession] สลับหน้าไป income → session-order');
  _doShowPage('income', document.querySelectorAll('.nav-item')[2]);
  posShowStep('session-order');
}

// Render จาก cache + pending (ใช้ตอน optimistic update)
function renderSessionOrderMerged() {

// ========== OPTIMISTIC SYNC FUNCTIONS ==========

// นับ pending items แล้วรอ 2 วินาทีก่อน sync
function schedulePendingSync() {
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(runPendingSync, 2000);
  showSyncBarPending();
}

// เริ่ม batch sync
function runPendingSync() {
  _syncTimer = null;
  if (_syncInProgress || pendingQueue.length === 0) {
    hideSyncBar();
    return;
  }
  _syncInProgress = true;
  const batch = pendingQueue.slice(); // snapshot
  pendingQueue = [];
  syncBatchItem(batch, 0);
}

function syncBatchItem(batch, index) {
  if (index >= batch.length) {
    // sync เสร็จทั้งหมด
    _syncInProgress = false;
    localSessionItems = localSessionItems.filter(i => !i._pending);
    // ถ้ามี items ที่เพิ่มระหว่าง sync กำลังวิ่ง → sync ต่อ
    if (pendingQueue.length > 0) {
      schedulePendingSync();
      return;
    }
    showSyncBarDone();
    // refresh จาก Supabase เพื่อได้ real IDs
    google.script.run
      .withSuccessHandler(function(res) {
        if (!res || !res.success) return;
        const sid = currentSessionId;
        const session = res.data.find(s => s.id === sid);
        if (session) {
          const ci = tableSessionCache.findIndex(s => s.id === sid);
          if (ci >= 0) tableSessionCache[ci] = session;
          else tableSessionCache.push(session);
          if (currentSessionId === sid) renderSessionOrder(session);
        }
      })
      .getOpenSessions();
    return;
  }

  const pct   = Math.round((index / batch.length) * 100);
  showSyncBarProgress(pct, batch.length);

  const payload  = batch[index];
  const tempId   = payload._tempId;
  const apiData  = {
    session_id:   payload.session_id,
    menu_item_id: payload.menu_item_id,
    menu_name:    payload.menu_name,
    price:        payload.price,
    qty:          payload.qty,
    note:         payload.note
  };

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        // ทำเครื่องหมายว่า sync แล้ว
        const li = localSessionItems.find(i => i._tempId === tempId);
        if (li) li._pending = false;
        syncBatchItem(batch, index + 1);
      } else {
        _syncInProgress = false;
        pendingQueue = batch.slice(index).concat(pendingQueue);
        showSyncBarError();
      }
    })
    .withFailureHandler(function() {
      _syncInProgress = false;
      pendingQueue = batch.slice(index).concat(pendingQueue);
      showSyncBarError();
    })
    .addOrderItem(apiData);
}

// ลบ pending item ก่อน sync
function removePendingItem(tempId) {
  localSessionItems = localSessionItems.filter(i => i._tempId !== tempId);
  pendingQueue      = pendingQueue.filter(i => i._tempId !== tempId);
  renderSessionOrderMerged();
  if (pendingQueue.length === 0 && _syncTimer) {
    clearTimeout(_syncTimer);
    _syncTimer = null;
    hideSyncBar();
  }
}

// ---- Sync bar UI ----
function showSyncBarPending() {
  const bar = document.getElementById('sync-bar');
  if (!bar) return;
  bar.style.display = 'block';
  bar.style.background = '#E8F5F0';
  bar.style.cursor = 'default';
  bar.onclick = null;
  document.getElementById('sync-bar-text').style.color = '#0F6E56';
  document.getElementById('sync-bar-text').textContent =
    'จะบันทึก ' + pendingQueue.length + ' รายการ...';
  document.getElementById('sync-bar-pct').textContent = '';
  document.getElementById('sync-bar-fill').style.width = '5%';
}

function showSyncBarProgress(pct, total) {
  const bar = document.getElementById('sync-bar');
  if (!bar) return;
  bar.style.display = 'block';
  bar.style.background = '#E8F5F0';
  bar.style.cursor = 'default';
  bar.onclick = null;
  document.getElementById('sync-bar-text').style.color = '#0F6E56';
  document.getElementById('sync-bar-text').textContent = 'กำลังบันทึก...';
  document.getElementById('sync-bar-pct').textContent = pct + '%';
  document.getElementById('sync-bar-fill').style.width = pct + '%';
}

function showSyncBarDone() {
  const bar = document.getElementById('sync-bar');
  if (!bar) return;
  document.getElementById('sync-bar-fill').style.width = '100%';
  document.getElementById('sync-bar-pct').textContent = '100%';
  document.getElementById('sync-bar-text').textContent = 'บันทึกแล้ว ✓';
  setTimeout(function() { hideSyncBar(); }, 1200);
}

function showSyncBarError() {
  const bar = document.getElementById('sync-bar');
  if (!bar) return;
  bar.style.background = '#FDE8E8';
  bar.style.cursor = 'pointer';
  bar.onclick = function() { retryPendingSync(); };
  document.getElementById('sync-bar-text').style.color = '#C0392B';
  document.getElementById('sync-bar-text').textContent =
    '❌ บันทึกไม่สำเร็จ — แตะเพื่อลองใหม่';
  document.getElementById('sync-bar-pct').textContent = '';
}

function hideSyncBar() {
  const bar = document.getElementById('sync-bar');
  if (bar) {
    bar.style.display = 'none';
    bar.style.background = '#E8F5F0';
    bar.onclick = null;
    document.getElementById('sync-bar-fill').style.width = '0%';
  }
}

function retryPendingSync() {
  if (pendingQueue.length > 0) {
    const bar = document.getElementById('sync-bar');
    if (bar) { bar.style.background = '#E8F5F0'; bar.style.cursor = 'default'; bar.onclick = null; }
    document.getElementById('sync-bar-text').style.color = '#0F6E56';
    runPendingSync();
  } else hideSyncBar();
}

  if (!currentSessionId) { posConfirmPayment(); return; }

  // ถ้ายังมี pending items ต้อง sync ให้เสร็จก่อน
  if (pendingQueue.length > 0 || _syncInProgress) {
    showToast('⏳ กำลังบันทึกรายการ... กรุณารอสักครู่');

        showToast('✅ ชำระเงินสำเร็จ · ' + res.invoice_no);

        loadDashboard(); loadHistory();
        updateTableBadge(openTables.length);
        loadPosStatus();
        posGoHome();
      } else {
        btn.textContent = '✓ ยืนยันรับชำระ';
        showToast('❌ ' + (res ? res.message : 'เกิดข้อผิดพลาด'));
      }
    })
    .withFailureHandler(function() {
      btn.disabled = false;
      btn.textContent = '✓ ยืนยันรับชำระ';
      showToast('❌ เกิดข้อผิดพลาด');
    })
    .closeSession({ session_id: currentSessionId });
}

    return;
  }

  el.innerHTML = active.map(s => {
    const todoItems = s.items.filter(i => i.status !== 'served')
      .slice().sort((a,b) => (a.menu_name||'').localeCompare(b.menu_name||'', 'th'));
    const doneCount = s.items.length - todoItems.length;
    return `
      <div style="background:#1e1e1e;border-radius:12px;margin-bottom:12px;overflow:hidden;">
        <div style="background:#085041;padding:10px 14px;display:flex;align-items:center;gap:8px;">
          <div style="color:#fff;font-size:15px;font-weight:600;">🍽 ${escHtml(s.table_name)}</div>

            รอ ${todoItems.length}${doneCount > 0 ? ` · เสร็จ ${doneCount}` : ''}</div>
        </div>

          <div style="padding:12px 14px;border-bottom:1px solid #2a2a2a;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
              <div style="flex:1;">
                <div style="font-size:15px;font-weight:600;color:#f0f0f0;">${escHtml(i.menu_name)}</div>

              </div>
              <div style="text-align:right;margin-left:12px;">
                <div style="font-size:14px;font-weight:600;color:#f0f0f0;">฿${i.price}</div>
                <div style="font-size:11px;color:#666;">x${i.qty}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
              <button onclick="kitchenSetStatus(${i.id},${s.id},'pending')"
                style="padding:9px 4px;border-radius:8px;border:1.5px solid ${isPending ? '#E8603A' : '#333'};
                background:${isPending ? '#E8603A' : 'transparent'};
                color:${isPending ? '#fff' : '#555'};font-size:12px;
                font-family:'Sarabun',sans-serif;cursor:pointer;
                font-weight:${isPending ? '600' : '400'};">

              <button onclick="kitchenSetStatus(${i.id},${s.id},'cooking')"
                style="padding:9px 4px;border-radius:8px;border:1.5px solid ${isCooking ? '#F5A623' : '#333'};
                background:${isCooking ? '#F5A623' : 'transparent'};
                color:${isCooking ? '#1a1a1a' : '#555'};font-size:12px;
                font-family:'Sarabun',sans-serif;cursor:pointer;
                font-weight:${isCooking ? '600' : '400'};">

              </button>
              <button onclick="kitchenSetStatus(${i.id},${s.id},'served')"
                style="padding:9px 4px;border-radius:8px;border:1.5px solid #333;

              </button>
            </div>
          </div>`;
        }).join('')}

function kitchenSetStatus(itemId, sessionId, targetStatus) {
  const labels = { pending: 'รอทำ', cooking: 'กำลังทำ', served: 'เสร็จแล้ว' };

  // Optimistic update — เปลี่ยน UI ทันทีไม่รอ server
  var prevStatus = null;
  var sessionIdx = tableSessionCache.findIndex(function(s) { return s.id === sessionId; });
  if (sessionIdx >= 0) {
    var itemIdx = tableSessionCache[sessionIdx].items.findIndex(function(i) { return i.id === itemId; });
    if (itemIdx >= 0) {
      prevStatus = tableSessionCache[sessionIdx].items[itemIdx].status;
      tableSessionCache[sessionIdx].items[itemIdx].status = targetStatus;
    }
  }
  if (document.getElementById('page-kitchen').classList.contains('active')) {
    renderKitchenOrders(tableSessionCache);
  }
  if (currentSessionId) {
    var cached = tableSessionCache.find(function(x) { return x.id === currentSessionId; });
    if (cached) renderSessionOrder(cached);
  }

  function revert() {
    if (sessionIdx >= 0 && prevStatus !== null) {
      var idx = tableSessionCache[sessionIdx].items.findIndex(function(i) { return i.id === itemId; });
      if (idx >= 0) tableSessionCache[sessionIdx].items[idx].status = prevStatus;
      if (document.getElementById('page-kitchen').classList.contains('active')) renderKitchenOrders(tableSessionCache);
      if (currentSessionId) {
        var s = tableSessionCache.find(function(x) { return x.id === currentSessionId; });
        if (s) renderSessionOrder(s);
      }
    }
  }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('✅ ' + (labels[targetStatus] || targetStatus));
        google.script.run
          .withSuccessHandler(function(r) {
            if (!r || !r.success) return;
            tableSessionCache = r.data || [];
            if (document.getElementById('page-kitchen').classList.contains('active')) {
              renderKitchenOrders(tableSessionCache);
            }
            if (currentSessionId) {
              var s = tableSessionCache.find(function(x) { return x.id === currentSessionId; });
              if (s) renderSessionOrder(s);
            }
          })
          .getOpenSessions();
      } else {
        revert();
        showToast('❌ อัพเดทไม่สำเร็จ');
      }
    })
    .withFailureHandler(function() { revert(); showToast('❌ อัพเดทไม่สำเร็จ'); })
    .updateItemStatus({ id: itemId, session_id: sessionId, status: targetStatus });
}



function posShowPaymentSession() {
  // รวม synced items + pending items ที่ยังไม่ sync
  const session      = tableSessionCache.find(s => s.id === currentSessionId);
  const syncedItems  = session ? (session.items || []) : [];
  const pendingItems = localSessionItems.filter(function(i) {
    return i._pending && i.session_id === currentSessionId;
  });
  const items = syncedItems.concat(pendingItems);
  const total = items.reduce(function(s,i) {
    return s + (parseFloat(i.price) || 0) * (parseInt(i.qty) || 0);
  }, 0);

  document.getElementById('pay-table-name').textContent  = currentSessionName;
  document.getElementById('pay-total-display').textContent =
    '฿' + total.toLocaleString('th',{minimumFractionDigits:2});
  document.getElementById('pay-received').value = '';
  document.getElementById('change-box').style.display = 'none';

  const bills = [20,50,100,500,1000];
  const suggested = [100,500,1000].reduce((best,b) => {
    const mult = Math.ceil(total/b)*b;
    return mult < best ? mult : best;
  }, Infinity);
  const grid = document.getElementById('bill-grid');
  grid.innerHTML = bills.map(b =>
    `<div class="bill-btn" onclick="posSelectBill(${b})">฿${b.toLocaleString()}</div>`
  ).join('') +
  `<div class="bill-btn" style="background:#E1F5EE;color:#085041;border-color:#1D9E75;font-size:11px;"
    onclick="posSelectBill(${suggested})">฿${suggested.toLocaleString()}<div style="font-size:9px;opacity:0.8;">แนะนำ</div></div>
   <div class="bill-btn" style="color:#999;border-style:dashed;font-size:12px;grid-column:span 2;"
    onclick="document.getElementById('pay-received').focus()">พิมพ์เอง</div>`;

  // override confirm button ให้ใช้ session
  document.getElementById('pos-btn-confirm').onclick = posConfirmSessionPayment;

  posShowStep('pay');
}
